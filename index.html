*Pour un oui ou pour un non* est à l'origine une pièce écrite pour la radio en 1981 et publiée en 1982. C'est un texte centré sur la parole des personnages : la parole est un thème de recherche privilégié de Sarraute.

                  ))}
                </div>

                <button onClick={() => openSim(texte)} style={{ ...css.btnDark, background: objet.couleur }}>
                  S'entraîner à l'oral avec Claude →
                </button>
              </>
            )}
          </div>
        </div>
      )}

      {tab === "cursives" && (
        <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
          {objet.lecturesCursives.map((l, i) => (
            <div key={i} style={css.card}>
              <h3 style={{ fontSize: 16, fontWeight: 500, marginBottom: 4 }}>{l.titre}</h3>
              <p style={{ fontSize: 13, color: "#888", marginBottom: "0.75rem" }}>{l.auteur}</p>
              <p style={{ fontSize: 14, lineHeight: 1.7, color: "#444" }}>{l.resume}</p>
            </div>
          ))}
        </div>
      )}

      {tab === "quiz" && (
        <div style={css.card}>
          {!quizDone ? (
            <>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: "1rem" }}>
                <span style={{ fontSize: 12, color: "#888" }}>Question {qIdx+1} / {objet.quiz.length}</span>
                <span style={{ fontSize: 12, color: "#888" }}>Score : {quizScore}</span>
              </div>
              <div style={{ background: objet.couleurClair, borderRadius: 8, padding: "0.9rem 1.1rem", marginBottom: "1rem" }}>
                <p style={{ fontSize: 15, fontWeight: 500, lineHeight: 1.5, color: objet.couleur }}>{objet.quiz[qIdx].q}</p>
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                {objet.quiz[qIdx].options.map((opt, i) => {
                  let bg = "#fff", bc = "#ddd", col = "#1a1a18";
                  if (quizAnswer !== null) {
                    if (i === objet.quiz[qIdx].r) { bg = "#eafaf1"; bc = "#27ae60"; col = "#1a6b3a"; }
                    else if (i === quizAnswer) { bg = "#fdf0ef"; bc = "#e74c3c"; col = "#a93226"; }
                  }
                  return (
                    <button key={i} onClick={() => handleQuizAnswer(i)} style={{ textAlign: "left", padding: "11px 14px", fontSize: 14, borderRadius: 8, border: `0.5px solid ${bc}`, background: bg, color: col, cursor: quizAnswer===null ? "pointer" : "default", lineHeight: 1.5 }}>{opt}</button>
                  );
                })}
              </div>
              {quizAnswer !== null && (
                <button onClick={nextQuestion} style={{ ...css.btnDark, background: objet.couleur, marginTop: "1.25rem" }}>
                  {qIdx+1 >= objet.quiz.length ? "Voir le résultat" : "Question suivante →"}
                </button>
              )}
            </>
          ) : (
            <div style={{ textAlign: "center", padding: "1.5rem 0" }}>
              <p style={{ fontSize: 42, fontWeight: 500, marginBottom: 8, color: objet.couleur }}>{quizScore} / {objet.quiz.length}</p>
              <p style={{ fontSize: 14, color: "#888", marginBottom: "1.5rem" }}>
                {quizScore >= objet.quiz.length * 0.8 ? "Excellent travail !" : quizScore >= objet.quiz.length * 0.5 ? "Bon début, continue à réviser." : "Reprends tes fiches avant de réessayer."}
              </p>
              <button onClick={resetQuiz} style={css.btn}>Recommencer le quiz</button>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function Entretien({ onBack }) {
  const [currentQ, setCurrentQ] = useState(null);
  const [reponse, setReponse] = useState("");
  const [historique, setHistorique] = useState([]);
  const [voiceSupported, setVoiceSupported] = useState(false);

  useEffect(() => {
    if ('speechSynthesis' in window) setVoiceSupported(true);
  }, []);

  function poserQuestion() {
    const dispo = questionsEntretien.filter(q => !historique.includes(q));
    const pool = dispo.length > 0 ? dispo : questionsEntretien;
    const q = pool[Math.floor(Math.random() * pool.length)];
    setCurrentQ(q);
    setReponse("");
    if (voiceSupported) {
      const u = new SpeechSynthesisUtterance(q);
      u.lang = "fr-FR";
      u.rate = 0.95;
      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(u);
    }
  }

  function relireQuestion() {
    if (currentQ && voiceSupported) {
      const u = new SpeechSynthesisUtterance(currentQ);
      u.lang = "fr-FR";
      u.rate = 0.95;
      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(u);
    }
  }

  function validerReponse() {
    if (currentQ && reponse.trim()) {
      setHistorique(h => [...h, currentQ]);
      setCurrentQ(null);
      setReponse("");
    }
  }

  return (
    <div style={{ maxWidth: 760, margin: "0 auto", padding: "2rem 1.25rem" }}>
      <button onClick={onBack} style={{ background: "none", border: "none", color: "#888", fontSize: 13, cursor: "pointer", marginBottom: "1rem", padding: 0 }}>← Retour</button>

      <div style={{ marginBottom: "1.5rem", paddingBottom: "1rem", borderBottom: "2px solid #1a1a18" }}>
        <div style={{ fontSize: 11, fontWeight: 500, color: "#888", marginBottom: 4, textTransform: "uppercase", letterSpacing: "0.08em" }}>2ᵉ partie de l'oral</div>
        <h1 style={{ fontSize: 22, fontWeight: 500, marginBottom: 4 }}>🎙 Entraînement à l'entretien</h1>
        <p style={{ fontSize: 13, color: "#888" }}>Questions sur votre lecture cursive</p>
      </div>

      {!voiceSupported && (
        <div style={{ background: "#fff3cd", border: "0.5px solid #ffc107", borderRadius: 8, padding: "0.75rem 1rem", marginBottom: "1rem", fontSize: 13, color: "#856404" }}>
          ⚠ Votre navigateur ne supporte pas la synthèse vocale. Les questions s'afficheront uniquement en texte.
        </div>
      )}

      <div style={{ ...css.card, marginBottom: "1rem" }}>
        <p style={{ fontSize: 14, lineHeight: 1.7, color: "#555", marginBottom: "1rem" }}>
          Cliquez sur le bouton pour qu'une question vous soit posée à l'oral. Répondez à l'écrit comme vous le feriez à l'oral, puis validez pour passer à la suivante. <strong>L'examinateur peut vous poser n'importe quelle question sur votre lecture cursive</strong>, alors entraînez-vous à varier vos réponses selon le livre que vous avez choisi.
        </p>

        {!currentQ ? (
          <button onClick={poserQuestion} style={css.btnDark}>
            🎙 Poser une question
          </button>
        ) : (
          <div>
            <div style={{ background: "#1a1a18", color: "#fff", borderRadius: 8, padding: "1rem 1.25rem", marginBottom: "1rem", display: "flex", alignItems: "flex-start", gap: 10 }}>
              <div style={{ fontSize: 20 }}>🎙</div>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 11, opacity: 0.6, marginBottom: 4, textTransform: "uppercase", letterSpacing: "0.08em" }}>Examinateur</div>
                <div style={{ fontSize: 15, lineHeight: 1.5 }}>{currentQ}</div>
              </div>
              {voiceSupported && (
                <button onClick={relireQuestion} title="Réécouter" style={{ background: "rgba(255,255,255,0.1)", border: "none", color: "#fff", borderRadius: 6, padding: "4px 10px", fontSize: 12, cursor: "pointer" }}>🔊</button>
              )}
            </div>

            <textarea
              value={reponse}
              onChange={e => setReponse(e.target.value)}
              placeholder="Votre réponse…"
              rows={6}
              style={{ width: "100%", fontSize: 14, padding: "10px 12px", resize: "vertical", lineHeight: 1.6, marginBottom: "0.75rem" }}
            />

            <div style={{ display: "flex", gap: 8 }}>
              <button onClick={validerReponse} disabled={!reponse.trim()} style={{ ...css.btnDark, opacity: reponse.trim() ? 1 : 0.4 }}>
                Valider et question suivante →
              </button>
              <button onClick={() => { setCurrentQ(null); setReponse(""); }} style={css.btn}>
                Passer
              </button>
            </div>
          </div>
        )}
      </div>

      {historique.length > 0 && (
        <div style={{ marginTop: "1.5rem" }}>
          <span style={{ ...css.label, marginBottom: 8 }}>Questions déjà posées ({historique.length})</span>
          <div style={{ fontSize: 12, color: "#888", lineHeight: 1.6 }}>
            {historique.map((q, i) => <div key={i} style={{ padding: "4px 0", borderBottom: "0.5px solid #eee" }}>{i+1}. {q}</div>)}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
