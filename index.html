/* ── AUDIO SYNTH ────────────────────────────────────────────────────────── */
function createAudio(type){
  const ctx=new(window.AudioContext||window.webkitAudioContext)();
  let nodes=[];
  if(type==='dorion'){
    // Arpèges doux, forêt
    const freqs=[261.6,329.6,392,523.2];
    let t=ctx.currentTime;
    const play=()=>{
      freqs.forEach((f,i)=>{
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.type='sine';o.frequency.value=f;
        g.gain.setValueAtTime(0,t+i*0.3);
        g.gain.linearRampToValueAtTime(0.06,t+i*0.3+0.1);
        g.gain.linearRampToValueAtTime(0,t+i*0.3+1.2);
        o.connect(g);g.connect(ctx.destination);
        o.start(t+i*0.3);o.stop(t+i*0.3+1.5);
        nodes.push(o);
      });
      t+=2.4;
    };
    play();
    const iv=setInterval(play,2400);
    return {stop:()=>{clearInterval(iv);try{ctx.close();}catch(e){}}};
  } else {
    // Luth Renaissance — dynamique, mode dorien
    const scale=[293.7,329.6,349.2,392,440,466.2,523.2,587.3];
    let t=ctx.currentTime;
    const play=()=>{
      const pattern=[0,2,4,7,5,3,1,4,6,2,0];
      pattern.forEach((idx,i)=>{
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.type='sawtooth';o.frequency.value=scale[idx%scale.length];
        g.gain.setValueAtTime(0,t+i*0.18);
        g.gain.linearRampToValueAtTime(0.08,t+i*0.18+0.04);
        g.gain.linearRampToValueAtTime(0,t+i*0.18+0.28);
        o.connect(g);g.connect(ctx.destination);
        o.start(t+i*0.18);o.stop(t+i*0.18+0.35);
      });
      t+=2.2;
    };
    play();
    const iv=setInterval(play,2200);
    return {stop:()=>{clearInterval(iv);try{ctx.close();}catch(e){}}};
  }
}

   mouvement:'Nouveau Roman / Théâtre de la parole',
   extrait:"H.1. – Écoute, je voulais te demander… C'est un peu pour ça que je suis venu… que s'est-il passé ? Qu'est-ce que tu as contre moi ?\nH.2. – Mais rien… Pourquoi ?\nH.1. – Il me semble que tu t'éloignes… tu ne fais plus jamais signe…\nH.2. – Tu sais bien : je prends rarement l'initiative, j'ai peur de déranger.\nH.1. – Nous n'en sommes tout de même pas là… Non, je sens qu'il y a quelque chose…\nH.2. – Mais que veux-tu qu'il y ait ?\nH.1. – il n'y a jamais rien eu entre nous… rien dont je me souvienne…\nH.2. – Moi, par contre, il y a des choses que je n'oublie pas.\n[…] H.1. – tu étais à l'autre bout du monde… ça me fait de la peine, tu sais…\nH.2. – Non… vraiment rien… Rien qu'on puisse dire…",
   problematique:"Comment cette scène d'exposition joue-t-elle sur l'incertitude des répliques pour annoncer un des thèmes centraux de la pièce ?",
   etapes:[
     {label:'L. 1–11',titre:"L'énigme de l'éloignement posée",procedes:["Dénomination H1/H2 — suppression du personnage traditionnel","Points de suspension et aposiopèse — parole qui se cherche","Modalisateur « un peu » — objet flou dès l'ouverture","Négation « tu ne fais plus jamais signe » — déséquilibre dans la relation","Antithèse « quelque chose » / « rien » — opposition structurante"]},
     {label:'L. 12–fin',titre:"L'analyse de l'amitié",procedes:["Antithèse jamais / toujours — fossé entre les deux","Tournure emphatique « il y a des choses que je n'oublie pas » — sonne comme une menace","Prosopopée de la mère + registre pathétique","Didascalie « hausse les épaules » — exaspération de H2","Pronoms sans référent (« ça », « quelque chose ») — impuissance du langage"]}
   ],
   grammaire:[
     {type:'qcm',q:"Dans « Rien qu'on puisse dire » (fin du texte), quel est le mode du verbe « puisse » et pourquoi ?",o:["Indicatif présent — il décrit un fait réel","Subjonctif présent — obligatoire après « rien » pour exprimer la virtualité","Conditionnel présent — exprime une hypothèse","Impératif — ordre implicite"],r:1,
      ex:"Subjonctif présent (3e personne du singulier de « pouvoir »). Après la négation absolue « rien », le subjonctif est obligatoire dans la relative. Il exprime la virtualité : il n'existe aucune parole qui soit possible. Fonction de la proposition : relative adjective épithète, complétant l'antécédent « rien »."},
     {type:'qcm',q:"Dans « je voulais te demander » (l. 1), quelle est la valeur de l'imparfait « voulais » ?",o:["Imparfait duratif : action en cours au passé","Imparfait d'atténuation (valeur modale) : adoucit la demande, marque la politesse","Imparfait de narration : donne de la vivacité","Imparfait itératif : action répétée"],r:1,
      ex:"Imparfait d'atténuation ou de politesse (valeur modale). H1 n'emploie pas le présent « je veux » — trop direct — mais l'imparfait pour formuler sa demande de façon moins abrupte. Cela traduit déjà l'hésitation et la tension qui caractérisent la pièce."},
     {type:'redige',q:"Relevez et analysez la nature des mots subordonnants dans les deux premières répliques de H1. Que révèle leur accumulation ?"},

  {id:3,objet:'theatre',numero:'EL 3',titre:"« C'est bien, ça »",auteur:'Nathalie Sarraute',date:'1981',
   mouvement:'Nouveau Roman / Théâtre de la parole',
   extrait:"H. 1 : Allons, vas-y…\nH. 2 : Eh bien, c'est juste des mots…\nH. 1 : Des mots ? Entre nous ? Ne me dis pas qu'on a eu des mots...\nH. 2 : Non, pas des mots comme ça... Des mots qu'on n'a pas « eus », justement...\nH. 2 : tu m'as dit : « C'est bien... ça... » Juste avec ce suspens... cet accent…\nH. 1 : Ce n'est pas vrai. Ça ne peut pas être ça...\nH. 2 : « C'est biiien…… ça... » Un étirement et un suspens avant que « ça » arrive... ce n'est pas sans importance.\nH. 1 : Et ça... ce « ça » précédé d'un suspens t'a poussé à rompre...",
   problematique:"Comment le dévoilement du motif de la dispute, d'apparence dérisoire, permet-il de réfléchir sur ce qui se cache derrière le langage quotidien ?",
   etapes:[
     {label:'L. 1–17',titre:'La montée du suspens',procedes:["Double impératif « Allons, vas-y » — pression maximale de H1","Adverbe « juste » — ironie pour le public (double énonciation)","Jeu sur l'expression figée « avoir des mots » + guillemets","Répétition « tu m'as dit » (trois fois) — difficulté à avouer","Reprise « rien » / « ce rien » avec déterminant — le rien est bien quelque chose"]},
     {label:'L. 17–fin',titre:'La révélation',procedes:["Chute comique : « C'est bien… ça… » — dérisoire au regard de l'attente","Suite de négations — incompréhension totale de H1","Précision phonique : « C'est biiien…… ça... » — le sens réside dans la voix, pas dans les mots","Question rhétorique « à quoi bon ? » — H2 se pose en victime incomprise"]}
   ],
   grammaire:[
     {type:'qcm',q:"Dans « Des mots qu'on n'a pas eus, justement », quelle est la nature de « qu' » ?",o:["Conjonction de subordination","Pronom relatif (COD de « a eus »)","Adverbe interrogatif","Pronom interrogatif"],r:1,
      ex:"« que » est ici un pronom relatif (et non une conjonction de subordination), car il remplace un nom : l'antécédent « mots ». Sa fonction dans la relative est COD du verbe « a eus » (on n'a pas eu ces mots). Pour distinguer : « je veux qu'il vienne » → que = conjonction (ne remplace pas de nom) ; « les mots qu'on a eus » → que = pronom relatif (reprend « mots »)."},
     {type:'qcm',q:"Dans « ce n'est pas sans importance » (fin), quelle est la valeur de cette tournure négative ?",o:["Négation totale : cela n'a aucune importance","Litote : cela a beaucoup d'importance","Euphémisme pour atténuer","Négation partielle portant sur l'intensité"],r:1,
      ex:"Litote : dire moins pour suggérer plus. « Ce n'est pas sans importance » = cela a beaucoup d'importance. C'est la figure par laquelle H2 souligne, par une formulation atténuée, le poids immense qu'il accorde à cette intonation."},
     {type:'redige',q:"Dans « c'est biiien…… ça... », identifiez les signes typographiques utilisés et expliquez leur valeur grammaticale et expressive."},
   ]
  },
  {id:4,objet:'theatre',numero:'EL 4',titre:'Le dénouement',auteur:'Nathalie Sarraute',date:'1981',
   mouvement:'Nouveau Roman / Théâtre de la parole',
   extrait:"H. 2 : puisque nous en sommes là... c'est comme de la claustrophobie... je suis dans un édifice fermé de tous côtés... j'ai envie de m'échapper...\nDu mal à reprendre vie... parfois encore le lendemain je me sens comme un peu inerte... il faut du temps pour que ça revienne, cette pulsation, un pouls qui se remet à battre…\nH. 1 : Oui. Je vois. Un silence. A quoi bon s'acharner ?\nH. 2 : Ce serait tellement plus sain…\nH. 1 : Pour chacun de nous... plus salutaire…\nH. 2 : La meilleure solution…\nH. 1 : Mais tu sais bien comment nous sommes.\nH. 2 : « ils peuvent rompre pour un oui ou pour un non »\nH. 1 : Pour un oui... ou pour un non ? Un silence.\nH. 2 : Oui ou non ?…\nH. 1 : Ce n'est pourtant pas la même chose…\nH. 1 : Oui.\nH. 2 : Non !",
   problematique:"En quoi le dénouement de Pour un oui ou pour un non se présente-t-il comme une résolution ambiguë ?",
   etapes:[
     {label:'L. 1–12',titre:'Le consentement à la rupture',procedes:["Subordonnée causale « puisque nous en sommes là » — écho de la scène d'exposition","Comparaison « comme de la claustrophobie » — image de l'enfermement kafkaïen","Antithèse mort/vie (« inerte » / « pouls qui se remet à battre »)","Anadiplose « Oui. Je vois. » — moment de compréhension mutuelle","Suite de stichomythies — accord de concert","Didascalie « Un silence » — décision de rupture actée dans le silence"]},
     {label:'L. 13–fin',titre:'Le dénouement ravi : la société juge',procedes:["Guillemets — frontière entre la société (juge) et les personnages","Vocabulaire judiciaire : « déboutés »","Délexicalisation de l'expression figée « pour un oui ou pour un non »","Exclamations finales « Oui. » / « Non ! » — duel ultime qui relance la pièce","Dénouement cyclique — propre au théâtre de l'Absurde"]}
   ],
   grammaire:[
     {type:'qcm',q:"Dans « puisque nous en sommes là », quelle est la nature et la valeur de cette proposition ?",o:["Proposition subordonnée circonstancielle de cause, introduite par « puisque » — cause connue des deux interlocuteurs","Proposition subordonnée complétive, COD du verbe principal","Proposition coordonnée par conjonction de coordination","Proposition subordonnée circonstancielle de temps"],r:0,
      ex:"Proposition subordonnée conjonctive circonstancielle de cause. « Puisque » (différent de « parce que ») introduit une cause présentée comme connue et admise des deux interlocuteurs. Elle est ici déplaçable et supprimable — sa fonction est complément circonstanciel de cause."},
     {type:'redige',q:"Dans « il faut du temps pour que ça revienne » (l. 2), analysez la nature et la valeur de la proposition subordonnée introduite par « pour que »."},
     {type:'qcm',q:"Dans la suite « plus sain / plus salutaire / la meilleure solution », quelle est la nature des comparatifs et superlatifs employés ?",o:["Deux comparatifs de supériorité (plus sain, plus salutaire) puis un superlatif relatif de supériorité (la meilleure)","Trois superlatifs absolus","Un comparatif d'infériorité et deux superlatifs","Deux adjectifs qualificatifs attributs et un nom"],r:0,
      ex:"Comparatif de supériorité : « plus + adjectif ». Superlatif relatif : « le/la + plus + adjectif ». La gradation ascendante (comparatif → comparatif → superlatif) souligne l'accord croissant des personnages sur la nécessité de la rupture."},

  {id:5,objet:'poesie',numero:'EL 5',titre:"« L'Isolement »",auteur:'Alphonse de Lamartine',date:'1820',
   mouvement:'Romantisme',
   extrait:"Souvent sur la montagne, à l'ombre du vieux chêne,\nAu coucher du soleil, tristement je m'assieds ;\nJe promène au hasard mes regards sur la plaine,\nDont le tableau changeant se déroule à mes pieds.\n[…]\nMais à ces doux tableaux mon âme indifférente\nN'éprouve devant eux ni charme ni transports,\nJe contemple la terre ainsi qu'une ombre errante :\nLe soleil des vivants n'échauffe plus les morts.\n[…]\nQue me font ces vallons, ces palais, ces chaumières,\nVains objets dont pour moi le charme est envolé ?\nFleuves, rochers, forêts, solitudes si chères,\nUn seul être vous manque, et tout est dépeuplé.",
   problematique:'Comment le poème crée-t-il un lien entre le paysage (extérieur) et la personnalité (intérieure) du poète ?',
   etapes:[
     {label:'Strophes 1–4',titre:'La description du paysage au crépuscule',procedes:["Suite de CC de lieu + temps — décor romantique (écho du tableau de Friedrich)","Adverbe « tristement » — coloration émotionnelle dès l'ouverture","Présence du « je » lyrique — le moi au centre","Métaphore « le tableau changeant » — lien avec la peinture","Antithèse « écumantes » / « dormantes » — clair-obscur","Périphrase « la reine des ombres » (la lune) — style néoclassique encore présent"]},
     {label:'Strophes 5–7',titre:"L'indifférence du poète au paysage",procedes:["Conjonction « Mais » — rupture, tournant du texte","Antithèse « doux tableaux » / « âme indifférente »","Double négation « n'éprouve… ni charme ni transports »","Comparaison « ainsi qu'une ombre errante » — métamorphose en fantôme","Antithèse « vivants / morts » — le poète dans le royaume des morts","Vers célèbre « Un seul être vous manque » — présent de vérité générale"]}

   grammaire:[
     {type:'qcm',q:"Dans « Je promène au hasard mes regards sur la plaine, / Dont le tableau changeant se déroule à mes pieds » (v. 3–4), quelle est la nature de « dont » ?",o:["Conjonction de subordination","Pronom relatif (complément du nom « tableau » : le tableau de la plaine)","Pronom relatif (complément du verbe « se déroule »)","Adverbe interrogatif"],r:1,

     {type:'qcm',q:"Dans « Le soleil des vivants n'échauffe plus les morts » (v. 20), quelle est la valeur du présent de l'indicatif ?",o:["Présent d'actualité : action en cours au moment de l'énonciation","Présent de vérité générale (ou gnomique) : énonce une loi universelle","Présent de narration : donne de la vivacité à un récit au passé","Présent futur proche"],r:1,

  {id:6,objet:'poesie',numero:'EL 6',titre:"« Mes forêts sont un champ silencieux »",auteur:'Hélène Dorion',date:'2021',
   mouvement:'Poésie contemporaine québécoise',
   extrait:"Mes forêts sont un champ silencieux\nde naissance et de morts\nla mémoire de saisons\nqui se lèvent et retombent\nmes forêts sont du temps qui s'immisce\nà travers tronc branche racine\nelles traversent le feuillage du jour\ncapturent l'ombre capturent l'éclat\nelles sont la solitude disséminée\ncomme poussière de notre passage\n[…]\nelles sont des ossements\nque lèche l'invisible\nune géométrie de souffles\net de pas qui se perdent\n[…]\nsi peu me fait vivre\nquand c'est plein d'étoiles\net que s'avance le poème.",
   problematique:"Comment le poème présente-t-il l'espace poétique de la forêt ?",
   etapes:[
     {label:'Strophes 1–3',titre:'Le temps qui passe au cœur des forêts',procedes:["Anaphore « Mes forêts sont » — appropriation affective par le possessif","Présent de vérité générale — définition universelle","Antithèses « naissance / morts », « se lèvent et retombent »","Verbes d'action « s'immisce », « traversent », « capturent » — forêt énergie active","Référence biblique « comme poussière de notre passage »","Champ lexical de l'écriture : « craie », « lettres », « mots »"]},
     {label:'Strophes 4–7',titre:"L'ambiguïté vie/mort et le lien avec le poème",procedes:["« ossements » — memento mori","Personnification « elles dorment nues mes forêts »","Vers bref « si peu me fait vivre » — humilité de la poétesse","Pronom réfléchi « s'avance le poème » — le poème s'alimente de lui-même"]}
   ],
   grammaire:[
     {type:'qcm',q:"Dans « une poignée de roches / qui savent les âges mes forêts » (v. 11–12), quelle est la nature et la fonction de la proposition « qui savent les âges » ?",o:["Proposition subordonnée relative adjective épithète déterminative de « une poignée de roches »","Proposition subordonnée circonstancielle de temps","Proposition subordonnée complétive COD","Proposition principale"],r:0,
      ex:"Proposition subordonnée relative adjective épithète déterminative. « qui » est le pronom relatif, sujet dans la relative ; son antécédent est « une poignée de roches ». La relative ne peut pas être supprimée sans modifier le sens : elle détermine quelles roches (celles qui savent les âges). Elle est donc déterminative (par opposition à explicative/apposée)."},
     {type:'redige',q:"Dans « et que s'avance le poème » (v. dernier), analysez l'ordre des mots (antéposition du verbe). Quelle est la nature de « que » dans ce vers ?"},
     {type:'qcm',q:"Dans « capturent l'ombre capturent l'éclat » (v. 8), quelle est la construction syntaxique notable ?",o:["Deux propositions juxtaposées (absence de conjonction de coordination)","Deux propositions coordonnées par « et »","Une proposition principale et une subordonnée relative","Une proposition avec deux COD"],r:0,
      ex:"Deux propositions juxtaposées (parataxe / asyndète) : absence de conjonction de coordination entre deux groupes verbaux de même structure. Ce procédé crée un rythme rapide, ternaire, et met en valeur l'énergie active de la forêt qui « capture » les deux contraires simultanément."},

  {id:7,objet:'poesie',numero:'EL 7',titre:"« Il souffle mille voix de vent »",auteur:'Hélène Dorion',date:'2021',

   extrait:"Il souffle mille voix de vent\nsur la montagne que traversent\ndes marées tant d'aubes\nun silence de fin de jour\nquand s'amorce la descente\nvers soi\n[…]\non entend que revient\nun désir d'orage\ndans le jardin chargé de remous\nle désordre des existences\noù l'on piétine la vie\n[…]\non appelle des catastrophes\npour les couvrir du tissu\nde nos indifférences\nil se fait tard\npour la nuit humaine\non ne pourra pas toujours\nne pas recommencer",

     {label:'Strophes 7–9',titre:"L'indifférence humaine et la fatalité",procedes:["Pronom indéfini « on » + possessif « nos » — toute l'humanité accusée","Synesthésie « regards étouffent », « poignées de cris »","Métaphore « nuit humaine » — responsabilité humaine","Double négation finale — répétition des failles humaines"]}

   grammaire:[
     {type:'qcm',q:"Dans « on appelle des catastrophes / pour les couvrir du tissu / de nos indifférences » (v. 26–28), quelle est la nature et la valeur de la proposition introduite par « pour » ?",o:["Proposition infinitive circonstancielle de but","Proposition subordonnée circonstancielle de cause introduite par une conjonction","Proposition principale","Proposition subordonnée complétive COD"],r:0,

     {type:'qcm',q:"Dans « quand s'amorce la descente / vers soi » (v. 5–6), quelle est la nature de la proposition introduite par « quand » ?",o:["Proposition subordonnée circonstancielle de temps","Proposition subordonnée circonstancielle de cause","Proposition principale","Proposition subordonnée complétive"],r:0,

  {id:8,objet:'poesie',numero:'EL 8',titre:"« La nuit s'approfondit »",auteur:'Hélène Dorion',date:'2021',
   mouvement:'Poésie contemporaine québécoise',
   extrait:"La nuit s'approfondit\net l'on se met à rêver\ndu haut des falaises de Rilke\ndans la forêt de Dante\non voit le passé\ndéjà on lit le futur\n[…]\non traverse le bois de Walden\nla mémoire des saisons de Zanzotto\nles paysages intérieurs\nd'Hopkins les clairières de Zambrano\nvers la connaissance de soi\non a marché on s'est plongé\ndans le long travail de l'amour\non a trébuché\nrebondi puis chuté de nouveau\nle temps jamais ne s'arrête\nnous dit l'arbre\n nous dit la forêt\net sur la branche du présent\nun poème murmure\nun chemin vaste et lumineux\nqui donne sens\nà ce qu'on appelle humanité",
   problematique:"Comment Hélène Dorion transforme-t-elle la fin de son recueil en art poétique ?",
   etapes:[

     {label:'v. 14–21',titre:"L'épreuve du temps",procedes:["Passé composé — bilan rétrospectif","Verbes successifs : trébuché, rebondi, chuté — chemin non linéaire","Typographie imitative : enjambements qui miment la chute","Parallélisme « nous dit l'arbre / nous dit la forêt » — prosopopée"]},
     {label:'v. 22–fin',titre:"Le rôle salvateur de la poésie",procedes:["Métaphore « sur la branche du présent » — instant précaire","Monostiche « un poème murmure » — humilité","Subordonnée relative « qui donne sens » — fonction de la poésie","Expression mise à distance « ce qu'on appelle humanité »"]}
   ],
   grammaire:[
     {type:'qcm',q:"Dans « le temps jamais ne s'arrête / nous dit l'arbre » (v. 19–20), quelle est la nature de « nous dit l'arbre » ?",o:["Une proposition principale","Une proposition incise (incidente), indiquant l'auteur du discours direct","Une proposition subordonnée complétive","Une proposition subordonnée relative"],r:1,
      ex:"Proposition incise (ou incidente) : elle s'intercale dans la phrase pour indiquer l'auteur des paroles, sans être ni principale ni subordonnée. Elle est syntaxiquement en apposition au discours direct. Ici, elle crée une prosopopée : l'arbre est présenté comme un locuteur à part entière, ce qui est caractéristique du style de Dorion."},
     {type:'redige',q:"Dans « un chemin vaste et lumineux / qui donne sens / à ce qu'on appelle humanité » (v. 24–26), analysez la nature et la fonction de la proposition subordonnée relative commençant par « qui »."},
     {type:'qcm',q:"Dans « on a marché on s'est plongé / dans le long travail de l'amour » (v. 15–16), quelle relation syntaxique unit les deux propositions « on a marché » et « on s'est plongé » ?",o:["Propositions coordonnées par une conjonction de coordination","Propositions juxtaposées (parataxe — absence de mot de liaison)","Proposition principale et proposition subordonnée","Propositions subordonnées relatives"],r:1,
      ex:"Propositions juxtaposées (parataxe / asyndète) : aucune conjonction de coordination ne les relie, seule la virgule (ici absente selon le style de Dorion) ou la simple succession les unit. Ce procédé caractéristique de l'écriture de Dorion mime le rythme de la marche : un pas, puis un autre, dans la continuité."},

  {id:9,objet:'roman',numero:'EL 9',titre:"Pleins phares — le meurtre de Karine",auteur:'Clémentine Haenel',date:'2023',
   mouvement:'Récit contemporain (parcours)',
   extrait:"Elle était revenue dans le salon un sourire timide aux lèvres. Mahdi l'avait su tout de suite, il n'allait pas tarder à la casser. Rien n'allait chez cette femme, il fallait abréger ses souffrances. Les yeux bleus translucides allaient gicler, les pommettes craquer, les fausses dents tomber. Enfin le grand soir. Mahdi s'était senti immédiatement revigoré. Bam, mieux que trois rails de coke. […]\nIl fallait célébrer et d'ailleurs Karine Coutelle l'avait sans doute senti, elle avait sorti les bouteilles de mousseux et les liqueurs de framboise, de quoi se faire des kirs royaux détonants. […] Mahdi avait demandé à Karine Coutelle de se laver longuement. Il se faisait le plaisir d'une victime propre et douchée. […] Karine Coutelle s'était imaginé que pour une fois Mahdi viendrait se coucher avec elle. Peut-être même l'allongerait-il, lui caresserait-il les avant-bras, les mollets et les joues […]. Au cas où, Karine Coutelle s'était aspergée de son Eau jeune Rebelle Chic.\nMahdi avait tué Karine Coutelle avec application. Il avait voulu expérimenter, prendre son temps. Ne pas bâcler était sans doute sa façon de rendre hommage. Il avait été mis en examen pour meurtre avec actes de torture et de barbarie. On avait évoqué sa cruauté et sa sauvagerie […]. Il n'en était pas peu fier. […] Ça survit, ça survit, ça agonise, ça crache du sang […] tu ne notes pas nécessairement l'instant où ça trépasse. T'es impliqué ou tu l'es pas. Karine vivante. Karine morte. C'est pas facile à distinguer. Mais il essayait encore de se remémorer […] sa maîtrise experte de bourreau tranquille.",
   problematique:"Comment le récit tente-t-il de reconstituer le point de vue du meurtrier ?",
   etapes:[
     {label:'L. 1–7',titre:"L'annonce du meurtre à venir",procedes:["Plus-que-parfait + futur proche dans le passé « il n'allait pas tarder à la casser » — montée du suspens","Discours indirect libre « Rien n'allait chez cette femme » — mépris du meurtrier","Énumération anticipative « yeux qui allaient gicler, pommettes craquer, fausses dents tomber » — basculement brutal dans l'horreur","Tournure emphatique « Enfin le grand soir » — ironie : ce n'est pas le soir de l'amour mais celui du meurtre","Registre familier « Bam, mieux que trois rails de coke » — proximité dérangeante avec la pensée du tueur","Accumulation grinçante (« surimi, Apéricube, gruyère, faux saumon dégueulasse ») — mépris social et culturel"]},
     {label:'L. 8–21',titre:"La préparation ritualisée du meurtre",procedes:["Verbe d'obligation « Il fallait célébrer » — sacralisation de l'acte criminel","Champ lexical de la propreté (« javel », « lingettes Cif », « ultra-propreté ») — dimension fétichiste, rituel sacrificiel","Noms de marque (« Eau jeune Rebelle Chic ») — effet de réel et ironie satirique","Antithèse « parcimonie / fréquemment » — efforts pathétiques de Karine pour plaire","Énumération de conditionnels « l'allongerait, caresserait, enlacerait, glisserait » — fantasmes amoureux de Karine, ironie tragique","Polyphonie : alternance entre point de vue de Mahdi (qui prépare le meurtre) et celui de Karine (qui espère l'amour)"]},
     {label:'L. 22–31',titre:"Le récit du meurtre par ellipse",procedes:["Litote « Ne pas bâcler » + euphémisme « rendre hommage » — renversement axiologique : la torture devient un geste de respect","Lexique juridique « meurtre avec actes de torture et de barbarie » — intrusion du discours social","Litote ironique « Il n'en était pas peu fier » — Mahdi revendique sa monstruosité","Répétition + pronom démonstratif neutre « ça » (« ça survit, ça agonise ») — réification de la victime","Passage au « tu » généralisant + présent gnomique — théorisation du meurtre","Oxymore final « bourreau tranquille » — violence extrême et sérénité froide"]}
   ],
   grammaire:[
     {type:'qcm',q:"Dans « il n'allait pas tarder à la casser » (l. 2), quel temps verbal est utilisé et quelle est sa valeur ?",o:["Imparfait à valeur descriptive","Futur proche dans le passé (semi-auxiliaire « aller » à l'imparfait + infinitif)","Conditionnel présent","Plus-que-parfait"],r:1,
      ex:"Futur proche dans le passé : structure « semi-auxiliaire aller à l'imparfait + infinitif ». Il exprime un futur par rapport à un repère passé. Effet : suspens — le meurtre est imminent dans le récit, même s'il est déjà accompli dans la diégèse."},
     {type:'qcm',q:"Dans « Il n'en était pas peu fier » (l. 25-26), quelle figure de style est employée ?",o:["Hyperbole","Litote (négation + adverbe minimisant qui équivaut à une affirmation forte)","Métaphore","Comparaison"],r:1,
      ex:"Litote : la double atténuation (« ne… pas » + adverbe diminutif « peu ») produit une affirmation renforcée. « Ne pas peu fier » = très fier. Effet : Mahdi revendique ironiquement sa monstruosité comme un titre de gloire."},
     {type:'qcm',q:"Dans « ça survit, ça survit, ça agonise, ça crache du sang » (l. 26-27), quelle est la nature du « ça » répété ?",o:["Pronom personnel sujet de 3e personne","Pronom démonstratif neutre (forme familière de « cela »)","Adverbe","Article indéfini"],r:1,
      ex:"Pronom démonstratif neutre : forme réduite et familière de « cela ». Fonction : sujet des verbes. Effet stylistique majeur : la réification de la victime, qui n'a plus de nom, plus d'humanité — juste un « ça » qui agonise."},
     {type:'redige',q:"Dans « tu comprends pas forcément et puis tu t'exaltes, tu fais ton truc » (l. 27-28), analysez la valeur du pronom « tu ». À qui s'adresse-t-il ? Quel est l'effet produit ?"},
     {type:'redige',q:"Dans « bourreau tranquille » (l. 31), identifiez la figure de style et expliquez précisément pourquoi cette construction est paradoxale d'un point de vue sémantique."},

  {id:10,objet:'roman',numero:'EL 10',titre:"La scène de rencontre",auteur:'Abbé Prévost',date:'1731',
   mouvement:'Roman du XVIIIe siècle',
   extrait:"J'avais marqué le temps de mon départ d'Amiens. Hélas ! que ne le marquais-je un jour plus tôt ! j'aurais porté chez mon père toute mon innocence. La veille même de celui que je devais quitter cette ville, étant à me promener avec mon ami, qui s'appelait Tiberge, nous vîmes arriver le coche d'Arras […]. Il en sortit quelques femmes, qui se retirèrent aussitôt. Mais il en resta une, fort jeune, qui s'arrêta seule dans la cour […]. Elle me parut si charmante que moi, qui n'avais jamais pensé à la différence des sexes, ni regardé une fille avec un peu d'attention, moi, dis-je, dont tout le monde admirait la sagesse et la retenue, je me trouvai enflammé tout d'un coup jusqu'au transport. […] je m'avançai vers la maîtresse de mon cœur. Quoiqu'elle fût encore moins âgée que moi, elle reçut mes politesses sans paraître embarrassée. Je lui demandai ce qui l'amenait à Amiens […]. Elle me répondit ingénument qu'elle y était envoyée par ses parents pour être religieuse. L'amour me rendait déjà si éclairé […] que je regardai ce dessein comme un coup mortel pour mes désirs. […] C'était malgré elle qu'on l'envoyait au couvent, pour arrêter sans doute son penchant au plaisir, qui s'était déjà déclaré et qui a causé, dans la suite, tous ses malheurs et les miens. […] Elle n'affecta ni rigueur ni dédain. […] La douceur de ses regards, un air charmant de tristesse en prononçant ces paroles, ou plutôt l'ascendant de ma destinée, qui m'entraînait à ma perte, ne me permirent pas de balancer un moment sur ma réponse.",
   problematique:"Comment le récit de cette rencontre transforme-t-il un simple coup de foudre en scène originelle d'une destinée tragique ?",
   etapes:[
     {label:'L. 1–5',titre:"L'installation du cadre du récit rétrospectif",procedes:["Plus-que-parfait « J'avais marqué » — distance du narrateur âgé qui se souvient","Interjection + tournure optative « Hélas ! que ne le marquais-je un jour plus tôt ! » — tonalité tragique d'emblée","Conditionnel passé « j'aurais porté toute mon innocence » — hypothèse irréelle, regret","Lexique de l'innocence — prolepse sur la déchéance à venir","Cadre quotidien banal (coche d'Arras, hôtellerie, simple curiosité) — contraste avec le destin tragique"]},
     {label:'L. 6–12',titre:"L'apparition de Manon",procedes:["Opposition pluriel/singulier « quelques femmes » / « il en resta une » — Manon se détache du groupe","Antithèse mouvement/immobilité « se retirèrent aussitôt » / « s'arrêta seule » — apparition presque théâtrale","Adverbe d'intensité « fort jeune » — innocence apparente trouble","Système consécutif « si charmante que » — démesure du sentiment","Reprise emphatique « moi, qui n'avais jamais… moi, dis-je, dont… » — autoportrait rétrospectif insistant","Métaphore du feu « enflammé tout d'un coup jusqu'au transport » — perte de contrôle, topos de la passion"]},
     {label:'L. 13–fin',titre:"La mise en place du tragique",procedes:["Métaphore de la domination amoureuse « la maîtresse de mon cœur » — Manon souveraine avant même de parler","Concession « Quoiqu'elle fût encore moins âgée que moi » + subjonctif — inversion paradoxale des rôles","Discours indirect — paroles de Manon filtrées par Des Grieux (le lecteur ne sait pas ce qu'elle a réellement dit)","Prolepse « qui a causé, dans la suite, tous ses malheurs et les miens » — toute la tragédie en germe","Double négation « Elle n'affecta ni rigueur ni dédain » — ambiguïté du personnage","Épanorthose « la douceur de ses regards […] ou plutôt l'ascendant de ma destinée » — Des Grieux se reprend : ce n'est pas Manon, c'est le destin"]}
   ],
   grammaire:[
     {type:'qcm',q:"Dans « j'aurais porté chez mon père toute mon innocence » (l. 2-3), quel est le mode et le temps de « aurais porté » ?",o:["Indicatif passé composé","Conditionnel passé 1re forme (auxiliaire au conditionnel présent + participe passé)","Subjonctif plus-que-parfait","Indicatif plus-que-parfait"],r:1,
      ex:"Conditionnel passé 1re forme : auxiliaire « avoir » au conditionnel présent (aurais) + participe passé (porté). Valeur : irréel du passé — situe le procès dans un passé révolu, en l'envisageant comme une possibilité annulée par le réel. Des Grieux exprime un regret pour ce qui n'a pas eu lieu."},
     {type:'qcm',q:"Dans « Quoiqu'elle fût encore moins âgée que moi » (l. 12), quel est le mode du verbe « fût » et quelle subordonnée introduit « quoique » ?",o:["Indicatif imparfait, subordonnée de cause","Subjonctif imparfait, subordonnée concessive","Conditionnel présent, subordonnée d'hypothèse","Subjonctif présent, subordonnée de but"],r:1,
      ex:"Subjonctif imparfait (3e personne de « être »). « Quoique » est une conjonction concessive qui exige le subjonctif. La subordonnée concessive introduit une circonstance qui pourrait empêcher l'action principale mais ne l'empêche pas. Ici : malgré sa jeunesse, Manon fait preuve d'assurance — paradoxe qui construit son ambivalence."},
     {type:'qcm',q:"Dans « qui a causé, dans la suite, tous ses malheurs et les miens » (l. 19), de quel procédé narratif s'agit-il ?",o:["Une analepse (retour en arrière)","Une prolepse (anticipation par le narrateur sur la suite du récit)","Une ellipse (saut temporel)","Une pause descriptive"],r:1,
      ex:"Prolepse : le narrateur âgé annonce explicitement, dans le récit présent, ce qui va arriver plus tard dans la diégèse. Le passé composé « a causé » relie le moment de l'énonciation au moment narré. Effet : la scène de rencontre devient scène originelle — tout le drame à venir est déjà contenu en germe."},
     {type:'redige',q:"Dans « moi, qui n'avais jamais pensé à la différence des sexes, ni regardé une fille avec un peu d'attention, moi, dis-je, dont tout le monde admirait la sagesse et la retenue » (l. 8-9), analysez la nature et la fonction des deux propositions subordonnées relatives introduites par « qui » et « dont »."},

  {id:11,objet:'roman',numero:'EL 11',titre:"Lescaut, le mauvais frère",auteur:'Abbé Prévost',date:'1731',
   mouvement:'Roman du XVIIIe siècle',
   extrait:"Je résolus d'abord d'aller consulter M. Lescaut, frère de Manon. Il connaissait parfaitement Paris, et je n'avais eu que trop d'occasions de reconnaître que ce n'était ni de son bien ni de la paie du roi qu'il tirait son plus clair revenu. Il me restait à peine vingt pistoles […]. Je lui montrai ma bourse, en lui expliquant mon malheur […], et je lui demandai s'il y avait pour moi un parti à choisir entre celui de mourir de faim, ou de me casser la tête de désespoir. Il me répondit que se casser la tête était la ressource des sots […] ; qu'il m'assurait de son secours et de ses conseils dans toutes mes entreprises. – Cela est bien vague, monsieur Lescaut, lui dis-je ; mes besoins demanderaient un remède plus présent […].\n– À propos de Manon, reprit-il, qu'est-ce qui vous embarrasse ? N'avez-vous pas toujours, avec elle, de quoi finir vos inquiétudes quand vous le voudrez ? Une fille comme elle devrait nous entretenir, vous, elle et moi. Il me coupa la réponse que cette impertinence méritait, pour continuer de me dire qu'il me garantissait avant le soir mille écus à partager entre nous, si je voulais suivre son conseil ; qu'il connaissait un seigneur si libéral sur le chapitre des plaisirs, qu'il était sûr que mille écus ne lui coûteraient rien pour obtenir les faveurs d'une fille telle que Manon. Je l'arrêtai.\n– J'avais meilleure opinion de vous, lui répondis-je […]. Il me confessa impudemment qu'il avait toujours pensé de même, et que, sa sœur ayant une fois violé les lois de son sexe […], il ne s'était réconcilié avec elle que dans l'espérance de tirer parti de sa mauvaise conduite. Il me fut aisé de juger que jusqu'alors nous avions été ses dupes. Quelque émotion néanmoins que ce discours m'eût causée, le besoin que j'avais de lui m'obligea de répondre, en riant, que son conseil était une dernière ressource qu'il fallait remettre à l'extrémité.",
   problematique:"Comment le dialogue entre Des Grieux et Lescaut fait-il du frère de Manon un portrait de personnage sans scrupule, tout en amorçant la chute morale de Des Grieux ?",
   etapes:[
     {label:'L. 1–9',titre:"La consultation du mauvais conseiller",procedes:["Passé simple « Je résolus » — décision marquée, ouverte sur l'erreur","Périphrase ironique « ce n'était ni de son bien ni de la paie du roi qu'il tirait son plus clair revenu » — Lescaut est désigné comme escroc avant même de parler","Hyperbole de la détresse « entre mourir de faim ou me casser la tête » — exagération pathétique qui prépare l'acceptation de tout","Discours indirect : les réponses de Lescaut sont rapportées par Des Grieux narrateur — distance critique rétrospective","Antithèse « vague » / « remède plus présent » — Des Grieux pousse Lescaut à se découvrir"]},
     {label:'L. 10–18',titre:"La proposition scandaleuse de Lescaut",procedes:["Question rhétorique « N'avez-vous pas toujours, avec elle, de quoi finir vos inquiétudes ? » — euphémisme cynique pour la prostitution","Pronoms d'inclusion « nous », « vous, elle et moi » — Lescaut associe Des Grieux à son trafic","Modalisateur d'apparence « comme elle » — Manon réduite à une fonction marchande","Métonymie « le chapitre des plaisirs » — vocabulaire libertin pour banaliser","Adverbe « si libéral » + consécutive « que mille écus ne lui coûteraient rien » — surenchère commerciale","Comparatif « une fille telle que Manon » — réification de Manon"]},
     {label:'L. 19–fin',titre:"La capitulation morale de Des Grieux",procedes:["Imparfait « j'avais meilleure opinion » — décalage entre l'attente et la réalité","Adverbe « impudemment » — jugement moral du narrateur rétrospectif sur Lescaut","Euphémisme « violé les lois de son sexe » — pour ne pas nommer la prostitution","Restrictive « il ne s'était réconcilié avec elle que dans l'espérance de tirer parti » — Lescaut a toujours été un proxénète","Aveu lucide « nous avions été ses dupes » — clairvoyance rétrospective","Concessive « Quelque émotion néanmoins que ce discours m'eût causée » + subjonctif — l'émotion est dépassée par le besoin","Participe « en riant » + « remettre à l'extrémité » — la capitulation morale est consommée : Des Grieux n'écarte pas la proposition, il la repousse à plus tard"]}
   ],
   grammaire:[
     {type:'qcm',q:"Dans « ce n'était ni de son bien ni de la paie du roi qu'il tirait son plus clair revenu » (l. 2-3), quelle structure est utilisée ?",o:["Une simple négation","Une tournure emphatique (« c'est… que ») combinée à une double négation « ni… ni »","Une interrogation indirecte","Une subordonnée relative"],r:1,
      ex:"Tournure emphatique « c'était… que » (extraction) qui met en relief le complément d'origine, combinée à la négation corrélée « ni… ni ». Effet rhétorique : par négations successives, Des Grieux suggère sans le dire ce que sont les vraies sources de revenus de Lescaut. La litote permet de qualifier sans accuser frontalement."},
     {type:'qcm',q:"Dans « N'avez-vous pas toujours, avec elle, de quoi finir vos inquiétudes ? » (l. 12-13), quel type de phrase est employé ?",o:["Phrase déclarative à la forme négative","Question rhétorique à la forme interro-négative (qui n'attend pas de réponse)","Phrase exclamative","Phrase injonctive"],r:1,
      ex:"Question rhétorique à la forme interro-négative. Elle n'attend pas de réponse car la réponse est implicitement évidente (« si, bien sûr »). Effet : Lescaut présente la prostitution de Manon comme une évidence, une banalité — c'est ce qui rend son propos scandaleux."},
     {type:'qcm',q:"Dans « Quelque émotion néanmoins que ce discours m'eût causée » (l. 25), analysez la construction « quelque… que » et le mode employé.",o:["Subordonnée relative à l'indicatif","Subordonnée concessive (« quelque + nom + que ») au subjonctif plus-que-parfait","Subordonnée d'hypothèse au conditionnel","Subordonnée complétive au subjonctif"],r:1,
      ex:"Subordonnée concessive : « quelque + nom + que + subjonctif » signifie « quelle que soit la quantité de… ». Mode subjonctif plus-que-parfait (eût causée). Valeur : Des Grieux concède que l'émotion fut grande, mais montre qu'elle n'a pas été suffisante pour l'arrêter — c'est exactement le moment de la capitulation morale."},
     {type:'redige',q:"Dans « Une fille comme elle devrait nous entretenir, vous, elle et moi » (l. 13-14), analysez le mode et la valeur du verbe « devrait », et la fonction des pronoms en apposition (« vous, elle et moi »)."},
     {type:'redige',q:"Dans « le besoin que j'avais de lui m'obligea de répondre, en riant, que son conseil était une dernière ressource qu'il fallait remettre à l'extrémité » (l. 26-27), montrez comment la syntaxe rend visible la capitulation morale de Des Grieux."},

  {id:12,objet:'roman',numero:'EL 12',titre:"L'épisode du Prince Italien",auteur:'Abbé Prévost',date:'1753',
   mouvement:'Roman du XVIIIe siècle',
   extrait:"À mon réveil, Manon me déclara que, pour passer le jour dans notre appartement, elle ne prétendait pas que j'en eusse l'air plus négligé, et qu'elle voulait que mes cheveux fussent accommodés de ses propres mains. […] Le goût qu'elle y avait pris m'avait paru si naturel, et sa gaieté sentait si peu l'artifice […]\n– Quoi donc ? m'écriai-je. Qui ? Quel prince ?\nElle ne répondit point à mes questions.\n– Faites-le monter, dit-elle froidement au valet ; et se tournant vers moi :\n– Cher amant, toi que j'adore, reprit-elle d'un ton enchanteur, je te demande un moment de complaisance, un moment, un seul moment.\n[…] elle empoigna d'une main mes cheveux, prit de l'autre son miroir de toilette ; l'ouvrant du genou, elle offrit à l'étranger un spectacle qui ne dut pas lui causer peu d'étonnement. […]\n– Voyez, monsieur, regardez-vous bien, et rendez-moi justice. Voici l'homme que j'aime, et que j'ai juré d'aimer toute ma vie. Faites la comparaison vous-même.",
   problematique:"Comment Prévost fait-il de cette scène intime une véritable mise en scène théâtrale où Manon s'affirme comme maîtresse du jeu ?",
   etapes:[
     {label:'L. 1–11',titre:"Le jeu de Manon et l'aveuglement de des Grieux",procedes:["Subjonctif de volonté « elle voulait que mes cheveux fussent » — Manon contrôle","Terme « amusement » — registre ludique qui endort la vigilance","Comparatif de supériorité « plus de soins » — indice de préméditation","Adverbes « si naturel / si peu l'artifice » — aveuglement de des Grieux"]},
     {label:'L. 12–19',titre:"L'affrontement verbal",procedes:["Phrases exclamatives brèves « Quoi ? Qui ? Quel prince ? » — stupéfaction, colère","Silence de Manon « ne répondit point » — contrôle absolu","Adverbe « froidement » — sang-froid contrastant avec l'émotion de des Grieux","Épanorthose « un moment, un seul moment » — minimisation rhétorique"]},
     {label:'L. 20–fin',titre:'Le coup de théâtre : Manon triomphante',procedes:["Verbe violent « empoigna » — les cheveux deviennent accessoire de scène","Détail comique « l'ouvrant du genou » — registre de la farce","Terme « spectacle » — dimension théâtrale, Manon metteuse en scène","Litote « ne dut pas lui causer peu d'étonnement »","Impératifs cinglants « Voyez / regardez-vous / Faites la comparaison »"]}
   ],
   grammaire:[
     {type:'qcm',q:"Dans « elle voulait que mes cheveux fussent accommodés de ses propres mains » (l. 2–3), quel est le mode et le temps de « fussent accommodés » ?",o:["Subjonctif imparfait passif (auxiliaire être au subjonctif imparfait + participe passé)","Indicatif imparfait passif","Conditionnel présent passif","Subjonctif présent passif"],r:0,
      ex:"Subjonctif imparfait passif : auxiliaire être au subjonctif imparfait (fussent, 3e pers. pl.) + participe passé (accommodés). Le subjonctif est obligatoire dans une complétive dépendant d'un verbe de volonté (« vouloir »). L'imparfait du subjonctif est la règle de concordance des temps quand le verbe principal est au passé."},
     {type:'redige',q:"Dans « Le goût qu'elle y avait pris m'avait paru si naturel, et sa gaieté sentait si peu l'artifice » (l. 5–6), analysez la nature et la fonction de la proposition subordonnée introduite par « qu' »."},
     {type:'qcm',q:"Dans « un spectacle qui ne dut pas lui causer peu d'étonnement » (l. 24), quelle figure de style est présente et comment la reconnaître grammaticalement ?",o:["Une métaphore — comparaison implicite entre le spectacle et une pièce de théâtre","Une litote — la négation + « peu » équivaut à « beaucoup » : il fut très étonné","Une hyperbole — exagération de l'étonnement","Un euphémisme — atténuation d'une réalité violente"],r:1,
      ex:"Litote, reconnaissable grammaticalement par la double atténuation : négation (« ne... pas ») + adverbe minimisant (« peu »). « Ne pas causer peu d'étonnement » = causer beaucoup d'étonnement. La structure logique est : NEG + peu = beaucoup. C'est la figure par laquelle on dit moins pour suggérer plus."},
   ]

  {id:13,objet:'idees',numero:'EL 13',titre:"« Le Loup et le Chien »",auteur:'Jean de La Fontaine',date:'1668',
   mouvement:'Classicisme — Fable/apologue (parcours)',
   extrait:"Un Loup n'avait que les os et la peau,\nTant les chiens faisaient bonne garde.\nCe Loup rencontre un Dogue aussi puissant que beau,\nGras, poli, qui s'était fourvoyé par mégarde.\nL'attaquer, le mettre en quartiers,\nSire Loup l'eût fait volontiers ;\nMais il fallait livrer bataille,\nEt le Mâtin était de taille\nÀ se défendre hardiment.\nLe Loup donc l'aborde humblement,\nEntre en propos, et lui fait compliment\nSur son embonpoint, qu'il admire.\n« Il ne tiendra qu'à vous beau sire,\nD'être aussi gras que moi, lui repartit le Chien.\nQuittez les bois, vous ferez bien :\nVos pareils y sont misérables,\nCancres, hères, et pauvres diables,\nDont la condition est de mourir de faim. […]\nSuivez-moi : vous aurez un bien meilleur destin. »\nLe Loup reprit : « Que me faudra-t-il faire ?\n– Presque rien, dit le Chien, donner la chasse aux gens\nPortants bâtons, et mendiants ;\nFlatter ceux du logis, à son Maître complaire […] »\nLe Loup déjà se forge une félicité\nQui le fait pleurer de tendresse.\nChemin faisant, il vit le col du Chien pelé.\n« Qu'est-ce là ? lui dit-il. – Rien. – Quoi ? rien ? – Peu de chose.\n– Mais encore ? – Le collier dont je suis attaché\nDe ce que vous voyez est peut-être la cause.\n– Attaché ? dit le Loup : vous ne courez donc pas\nOù vous voulez ? – Pas toujours ; mais qu'importe ?\n– Il importe si bien, que de tous vos repas\nJe ne veux en aucune sorte,\nEt ne voudrais pas même à ce prix un trésor. »\nCela dit, maître Loup s'enfuit, et court encor.",
   problematique:"Comment La Fontaine fait-il, dans cette fable, un éloge de la liberté tout en dénonçant la « servitude volontaire » ?",
   etapes:[
     {label:'V. 1–9',titre:"La rencontre : portraits contrastés",procedes:["Hyperbole « les os et la peau » — dénuement extrême du Loup","Subordonnée consécutive « Tant… que » — la maigreur s'explique par la vigilance des chiens","Comparaison d'égalité « aussi puissant que beau » + accumulation d'adjectifs mélioratifs « Gras, poli » — embonpoint presque aristocratique du Dogue","Antithèse Loup/Dogue : sauvage et affamé vs domestique et soigné","Périphrase héroï-comique « Sire Loup » — décalage comique","Conditionnel passé 2e forme « l'eût fait » — irréel du passé, le désir existe mais l'acte n'aura pas lieu","Verbe impersonnel « il fallait » — la prudence l'emporte sur l'instinct"]},
     {label:'V. 10–32',titre:"L'éloge tentant de la domesticité",procedes:["Adverbe « humblement » + gradation des verbes « aborde, entre en propos, fait compliment » — manœuvre rhétorique, premier signe de servitude","Tournure impersonnelle « Il ne tiendra qu'à vous » — toute la responsabilité du côté du Loup","Apostrophe flatteuse « beau sire » — captatio benevolentiae","Impératif « Quittez » + futur de promesse « vous aurez un bien meilleur destin » — discours d'embauche","Accumulation péjorative « Cancres, hères, et pauvres diables » — dévalorisation de la liberté","Métaphore guerrière « à la pointe de l'épée » — la liberté présentée comme une lutte permanente","Litote « Presque rien » — minimisation des renoncements","Énumération des infinitifs « donner la chasse, flatter, complaire » — système de servitude de courtisan","Anaphore « os de poulets, os de pigeons » — les restes du maître démasqués","Adverbe « déjà » + hyperbole « pleurer de tendresse » — rapidité de la séduction, ironie"]},
     {label:'V. 33–fin',titre:"Le dénouement : le collier et le choix de la liberté",procedes:["Gérondif « Chemin faisant » + passé simple « il vit » — révélation surgit en plein mouvement","Détail concret « le col du Chien pelé » — la trace physique contredit tout le discours","Stichomythie « Rien. – Quoi ? rien ? – Peu de chose » — méfiance soudaine, gêne du Chien","Voix passive « je suis attaché » + modalisateur « peut-être » — mauvaise foi du Chien","Question rhétorique « vous ne courez donc pas où vous voulez ? » — la liberté de choix comme absolu","Ellipse + concession « Pas toujours ; mais qu'importe ? » — aveu de la servitude volontaire","Polyptote « qu'importe » / « il importe » + consécutive « si bien que » — renversement implacable","Hyperbole « un trésor » + double négation — la liberté comme bien sans équivalent","Périphrase finale « maître Loup » + présent de narration « court encor » — promotion symbolique : en choisissant la liberté, le Loup devient véritablement maître de lui-même"]}

   grammaire:[
     {type:'qcm',q:"Dans « Sire Loup l'eût fait volontiers » (v. 6), quel est le mode et le temps de « eût fait » et sa valeur ?",o:["Subjonctif plus-que-parfait, valeur de souhait","Conditionnel passé 2e forme (= subjonctif plus-que-parfait à valeur de conditionnel passé), valeur d'irréel du passé","Indicatif passé antérieur, valeur d'antériorité","Conditionnel présent, valeur d'hypothèse"],r:1,
      ex:"Conditionnel passé 2e forme (forme identique au subjonctif plus-que-parfait, mais à valeur conditionnelle). Exprime l'irréel du passé : ce qui aurait pu se produire mais ne s'est pas produit. Le Loup l'aurait fait s'il l'avait pu — mais le Dogue était trop fort. Cette forme littéraire est typique du classicisme."},
     {type:'qcm',q:"Dans « Tant les chiens faisaient bonne garde » (v. 2), quelle est la nature de cette proposition par rapport à la précédente ?",o:["Proposition principale juxtaposée","Proposition subordonnée conjonctive circonstancielle de conséquence (introduite par « tant ») ","Proposition subordonnée relative","Proposition subordonnée de cause introduite par « tant »"],r:1,
      ex:"Subordonnée consécutive : « tant » introduit la conséquence en l'antéposant (forme inversée de « si bien que » ou « tellement que »). La structure complète est : (cause) le Loup n'a que les os et la peau, (conséquence implicite : c'est parce que) tant les chiens font bonne garde. Cette antéposition est un effet stylistique caractéristique de la fable."},
     {type:'qcm',q:"Dans « Le collier dont je suis attaché » (v. 35), analysez le pronom relatif « dont ».",o:["« dont » = de qui — antécédent « collier », fonction complément d'agent du verbe passif « suis attaché »","« dont » = duquel — antécédent « Loup », fonction complément du nom","« dont » = à qui — antécédent « collier », fonction COI","« dont » est ici une conjonction"],r:0,
      ex:"Pronom relatif « dont » = équivalent de « de qui / par lequel ». Antécédent : « collier ». Fonction dans la relative : complément d'agent du verbe passif « suis attaché » (je suis attaché par le collier). La voix passive « je suis attaché » est essentielle : le Chien n'est pas sujet, il est objet d'une attache."},
     {type:'redige',q:"Dans la stichomythie finale « Pas toujours ; mais qu'importe ? – Il importe si bien, que de tous vos repas / Je ne veux en aucune sorte » (v. 37-39), analysez le polyptote « qu'importe / il importe » et la subordonnée consécutive « si bien que ». Quel effet rhétorique ces deux procédés produisent-ils ?"},
     {type:'redige',q:"Dans « Sire Loup » (v. 6) puis « maître Loup » (v. 41), analysez la nature et la valeur de ces deux périphrases. Quelle évolution symbolique marque le changement de titre ?"},

  {id:14,objet:'idees',numero:'EL 14',titre:"« Pauvres gens misérables »",auteur:'Étienne de La Boétie',date:'1576',
   mouvement:'Humanisme / Renaissance',
   extrait:"Pauvres gens misérables, peuples insensés, nations opiniâtres à votre mal et aveugles à votre bien ! Vous vous laissez enlever sous vos yeux le plus beau et le plus clair de votre revenu, vous laissez piller vos champs, voler et dépouiller vos maisons […] Et tous ces dégâts, ces malheurs, cette ruine, ne vous viennent pas des ennemis, mais certes bien de l'ennemi, de celui-là même que vous avez fait ce qu'il est […] Ce maître n'a pourtant que deux yeux, deux mains, un corps, et rien de plus que n'a le dernier des habitants. […] Vous semez vos champs pour qu'il les dévaste, vous meublez vos maisons pour fournir ses pilleries, vous élevez vos filles afin qu'il puisse assouvir sa luxure, vous nourrissez vos enfants pour qu'il en fasse des soldats […] Soyez résolus à ne plus servir, et vous voilà libres. […] vous le verrez, tel un grand colosse dont on a brisé la base, fondre sous son poids et se rompre.",
   problematique:"Comment La Boétie dénonce-t-il la responsabilité du peuple dans sa propre servitude ?",
   etapes:[
     {label:'L. 1–5',titre:'Le constat des dépossessions',procedes:["Apostrophe + gradation ternaire : « gens, peuples, nations »","Antithèse « mal / bien » — aveuglement pathologique","Anaphore « vous laissez » — la passivité comme responsabilité","Énumération des verbes de dépossession : « enlever, piller, voler, dépouiller »"]},
     {label:'L. 6–14',titre:'Le responsable : le maître créé par le peuple lui-même',procedes:["Antithèse « des ennemis » (pluriel) / « de l'ennemi » (singulier défini)","Proposition relative « celui-là même que vous avez fait ce qu'il est » — thèse centrale","Négation restrictive « n'a que deux yeux, deux mains » — désacralisation du tyran","Série de questions rhétoriques — imposition d'une évidence"]},
     {label:'L. 15–fin',titre:'La solution : maxime finale',procedes:["Anaphore « Vous semez / vous meublez / vous élevez / vous nourrissez »","Subordonnées de but (« pour que », « afin que ») — actes présentés comme intentionnels","Maxime « Soyez résolus à ne plus servir, et vous voilà libres »","Comparaison finale « tel un grand colosse » — allusion biblique"]}

   grammaire:[
     {type:'qcm',q:"Dans « Vous semez vos champs pour qu'il les dévaste » (l. 15), quelle est la nature et la valeur de la proposition « pour qu'il les dévaste » ?",o:["Proposition subordonnée conjonctive circonstancielle de but, verbe au subjonctif","Proposition subordonnée conjonctive circonstancielle de cause, verbe à l'indicatif","Proposition subordonnée complétive COD, verbe au subjonctif","Proposition subordonnée circonstancielle de conséquence, verbe à l'indicatif"],r:0,
      ex:"Proposition subordonnée conjonctive circonstancielle de but, introduite par la locution conjonctive « pour que ». Le verbe est au subjonctif présent (mode obligatoire dans les subordonnées de but). Elle est complément circonstanciel de but. Sa valeur rhétorique est percutante : La Boétie présente comme une finalité volontaire ce qui est en réalité le résultat de la passivité."},
     {type:'redige',q:"Dans « de celui-là même que vous avez fait ce qu'il est » (l. 7), analysez la nature et la fonction des deux propositions relatives présentes dans ce groupe."},
     {type:'qcm',q:"Dans « Ce maître n'a pourtant que deux yeux, deux mains, un corps » (l. 8), quelle est la valeur de « ne... que » ?",o:["Négation totale : le maître n'a absolument rien","Négation exceptive : équivaut à « seulement » — restreint ce qu'il a","Négation partielle portant sur la quantité","Négation lexicale"],r:1,
      ex:"Négation exceptive : « ne... que » équivaut à « seulement ». Ce n'est pas une négation au sens strict — elle ne nie pas mais restreint (il a seulement deux yeux, deux mains...). Elle est différente de la négation totale (ne... pas, ne... jamais). Sa valeur rhétorique : elle ramène le tyran à une humanité ordinaire, le désacralise."},

  {id:15,objet:'idees',numero:'EL 15',titre:"« Cinq ou six »",auteur:'Étienne de La Boétie',date:'1576',
   mouvement:'Humanisme / Renaissance',
   extrait:"J'en arrive maintenant à un point qui est, selon moi, le ressort et le secret de la domination […] Ce ne sont pas les bandes de gens à cheval, les compagnies de fantassins, ce ne sont pas les armes qui défendent un tyran, mais toujours quatre ou cinq hommes qui le soutiennent. Il en a toujours été ainsi : cinq ou six ont eu l'oreille du tyran […] Ces six en ont sous eux six cents, qu'ils corrompent autant qu'ils ont corrompu le tyran. Ces six cents en tiennent sous leur dépendance six mille, qu'ils élèvent en dignité. […] non pas six mille, mais cent mille et des millions tiennent au tyran par cette chaîne ininterrompue […] En somme, par les gains et les faveurs qu'on reçoit des tyrans, on en arrive à ce point qu'ils se trouvent presque aussi nombreux, ceux auxquels la tyrannie profite, que ceux auxquels la liberté plairait.",

     {label:'L. 11–25',titre:'La pyramide de la corruption',procedes:["Adverbe « toujours » — loi universelle","Champ lexical du vice : « cruautés, plaisirs, voluptés, rapines »","Verbe « dresser » (dressage animalier) — les six éduquent le tyran","Progression géométrique : 6 → 600 → 6000 — mathématique de la corruption","Métaphore de la chaîne — solidarité et servitude"]},

   grammaire:[
     {type:'qcm',q:"Dans « Ces six cents en tiennent sous leur dépendance six mille, qu'ils élèvent en dignité » (l. 15), quelle est la nature et la fonction de la proposition « qu'ils élèvent en dignité » ?",o:["Proposition subordonnée relative adjective épithète déterminative de « six mille »","Proposition subordonnée complétive COD","Proposition subordonnée circonstancielle de but","Proposition principale"],r:0,

     {type:'redige',q:"Dans la phrase finale : « on en arrive à ce point qu'ils se trouvent presque aussi nombreux, ceux auxquels la tyrannie profite, que ceux auxquels la liberté plairait », analysez le système corrélatif « aussi... que » et la valeur du conditionnel « plairait » par rapport au présent « profite »."},
     {type:'qcm',q:"Dans « Celui qui penserait que les hallebardes garantissent les tyrans, se tromperait fort » (début), quel est le mode et le temps des verbes « penserait » et « se tromperait », et quelle est leur valeur ?",o:["Indicatif imparfait — description d'une action passée","Conditionnel présent — exprime une hypothèse (système conditionnel sans « si »)","Subjonctif présent — obligation après « celui qui »","Futur simple — certitude"],r:1,
      ex:"Conditionnel présent. Dans ce système conditionnel, le « si » est absent mais la valeur est bien hypothétique : si quelqu'un pensait cela, il se tromperait. Le conditionnel dans une proposition relative peut exprimer une hypothèse sur le sujet de la principale. Les deux verbes sont au même mode et temps, créant un système de cause/conséquence hypothétique."},

  {id:16,objet:'idees',numero:'EL 16',titre:"« Le tyran n'aime jamais »",auteur:'Étienne de La Boétie',date:'1576',
   mouvement:'Humanisme / Renaissance',
   extrait:"Certainement le tyran n'aime jamais, et n'est jamais aimé. L'amitié est un nom sacré, une chose sainte. Elle n'existe qu'entre gens de bien. Elle naît d'une mutuelle estime et s'entretient moins par les bienfaits que par l'honnêteté. Ce qui rend un ami sûr de l'autre, c'est la connaissance de son intégrité. […] Il ne peut y avoir d'amitié là où se trouvent la cruauté, la déloyauté, l'injustice. Entre méchants, lorsqu'ils s'assemblent, c'est un complot et non une société. Ils ne s'aiment pas mais se craignent. Ils ne sont pas amis, mais complices.\nQuand bien même cela ne serait pas, il serait difficile de trouver chez un tyran un amour sûr, parce qu'étant au-dessus de tous et n'ayant pas de pairs, il est déjà au-delà des bornes de l'amitié. Celle-ci fleurit dans l'égalité, dont la marche est toujours égale et ne peut jamais clocher. […]\nMais les favoris d'un tyran ne peuvent jamais compter sur lui parce qu'ils lui ont eux-mêmes appris qu'il peut tout, qu'aucun droit ni devoir ne l'oblige, qu'il est habitué à n'avoir pour raison que sa volonté, qu'il n'a pas d'égal et qu'il est le maître de tous. N'est-il pas déplorable que […] personne ne veuille tirer leçon des misères d'autrui et que tant de gens s'approchent encore si volontiers des tyrans ? Qu'il ne s'en trouve pas un pour avoir la prudence et le courage de leur dire, comme le renard de la fable au lion qui faisait le malade : « J'irais volontiers te rendre visite dans ta tanière ; mais je vois assez de traces de bêtes qui y entrent ; quant à celles qui en sortent, je n'en vois aucune. »",
   problematique:"Comment La Boétie démontre-t-il l'impossibilité de la relation avec le tyran et ainsi l'aveuglement des courtisans ?",
   etapes:[
     {label:'L. 1–7',titre:"Définition de l'amitié véritable, inaccessible aux « méchants »",procedes:["Maxime liminaire « Certainement le tyran n'aime jamais, et n'est jamais aimé » — parallélisme actif/passif, anaphore de « jamais »","Lexique religieux « nom sacré », « chose sainte » — héritage cicéronien, écho de l'amitié avec Montaigne","Énumération ternaire des vertus (bon naturel, fidélité, constance) puis des vices (cruauté, déloyauté, injustice) — antithèse structurante","Triple antithèse finale « complot / société », « aimer / craindre », « amis / complices » — démasque l'apparence"]},

     {label:'L. 16–fin',titre:"La dénonciation de l'aveuglement des courtisans",procedes:["Conjonction « Mais » + pronom réfléchi « eux-mêmes » — responsabilité tragique des courtisans","Anaphore en « qu'il » (quatre subordonnées complétives) — martèlement des caractéristiques du pouvoir absolu","Question oratoire pathétique « N'est-il pas déplorable que… » — indignation","Apologue final du renard (Ésope) — clausule narrative ; antithèse « entrer / sortir » ; la tanière comme piège à sens unique"]}
   ],
   grammaire:[
     {type:'qcm',q:"Dans « Certainement le tyran n'aime jamais, et n'est jamais aimé » (l. 1), quelle figure de construction relie « n'aime jamais » et « n'est jamais aimé » ?",o:["Une anaphore","Un parallélisme syntaxique entre actif et passif","Un chiasme","Une épanorthose"],r:1,
      ex:"Parallélisme syntaxique : reprise de la même structure (négation + verbe + adverbe « jamais ») d'abord à la voix active (« n'aime »), puis à la voix passive (« n'est aimé »). La symétrie souligne que l'impossibilité d'aimer est réciproque, dans les deux sens. Combinée à l'anaphore négative de « jamais », elle donne à la maxime une portée absolue."},
     {type:'qcm',q:"Dans « Quand bien même cela ne serait pas » (l. 8), quelle est la valeur de cette locution conjonctive et du mode employé ?",o:["Subordonnée de cause à l'indicatif","Subordonnée concessive exprimant une hypothèse irréelle, verbe au subjonctif imparfait","Subordonnée de conséquence au conditionnel","Subordonnée de but au subjonctif présent"],r:1,
      ex:"Locution conjonctive concessive « quand bien même » (= « même si ») introduit une hypothèse irréelle ; elle exige le conditionnel (ou subjonctif imparfait selon analyse). Ici « ne serait pas » est au conditionnel présent. Valeur rhétorique : La Boétie suppose un instant que son premier argument serait écarté pour mieux en proposer un second, plus radical."},

      ex:"Participes présents formant une proposition subordonnée participiale (sans sujet propre exprimé, le sujet étant repris dans la principale par « il »). Valeur causale ici, redoublant la subordonnée en « parce que ». Différent du gérondif (qui aurait « en étant », « en n'ayant ») et de l'adjectif verbal (qui s'accorderait)."},
