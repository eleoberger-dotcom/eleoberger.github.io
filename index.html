const GRAM_NOTIONS=[
  {titre:"Les classes grammaticales",items:["Nom (propre / commun) — varie en genre et en nombre","Déterminant — devant le nom : articles définis (le, la, les), indéfinis (un, une, des), partitifs (du, de la), possessifs (mon, ton…), démonstratifs (ce, cette…), indéfinis (chaque, aucun…)","Adjectif — précise le sens d'un nom ; varie en genre et en nombre","Pronom — remplace un nom : personnel, possessif, démonstratif, indéfini, interrogatif, relatif","Verbe — varie en personne, nombre, temps, mode, voix","Adverbe (invariable) — précise un verbe, un adjectif, un autre adverbe","Préposition (invariable) — introduit un GN, pronom, infinitif : à, de, par, pour, sans, en, vers, sous…","Conjonction de coordination : mais, ou, et, donc, or, ni, car","Conjonction de subordination — introduit une subordonnée : que, quand, si, parce que, bien que…"]},
  {titre:"Les valeurs des temps de l'indicatif",items:["Présent : d'actualité · de vérité générale · de narration (vivacité) · futur proche · ordre","Passé simple : action de premier plan, achevée, délimitée dans le temps (à l'écrit surtout)","Imparfait : second plan, description, action inachevée / durative · valeurs modales : politesse, hypothèse, regret","Plus-que-parfait : action antérieure à un repère passé · irréel du passé","Futur simple : action à venir · certitude · ordre · vérité générale","Futur antérieur : action accomplie avant un repère futur · supposition","Conditionnel présent : condition · demande polie · hypothèse non avérée · information non confirmée","Conditionnel passé : possibilité non réalisée · atténuation · irréel du passé"]},
  {titre:"Le subjonctif et l'impératif",items:["Subjonctif — mode du possible, de la virtualité, de la subjectivité","En subordonnée complétive : après verbes de volonté (vouloir, désirer…), de sentiment (craindre, regretter…), de doute","En subordonnée circonstancielle : but (pour que, afin que), concession (bien que, quoique), temps (avant que)","En subordonnée relative : après superlatif, après négation absolue (rien, nul, personne…)","Impératif — mode de la volonté : ordre · défense · demande polie · conseil","Impératif présent : action future proche ou lointaine","Impératif passé : action achevée à un moment futur (« Sois rentrée avant minuit »)"]},
  {titre:"Les propositions subordonnées relatives",items:["Introduite par un pronom relatif : qui, que, quoi, dont, où (simples) ; lequel, auquel, duquel… (composés)","⚠️ « que » est un pronom relatif seulement s'il remplace un nom (antécédent). Sinon c'est une conjonction de subordination.","Relative épithète (déterminative) : ne peut être supprimée sans modifier le sens de la phrase principale","Relative apposée (explicative) : peut être supprimée ; souvent entre virgules","Relative sans antécédent (substantive) : équivalente à un GN — peut être sujet, COD, COI…","Fonction du pronom relatif dans la relative : sujet (qui), COD (que), COI/CDN (dont), CC de lieu (où)…"]},
  {titre:"Les propositions subordonnées circonstancielles",items:["Cause : parce que, puisque (cause connue), dès lors que…","Conséquence : si bien que, de sorte que, au point que… (indicatif)","But : pour que, afin que, de peur que… (subjonctif obligatoire)","Temps : quand, lorsque, après que (indicatif), avant que (subjonctif)…","Condition : si + présent → futur (éventuel) · si + imparfait → conditionnel présent (potentiel/irréel) · si + plus-que-parfait → conditionnel passé (irréel du passé)","Concession : bien que, quoique, encore que… (subjonctif)","Opposition : tandis que, alors que, au lieu que… (indicatif)"]},
  {titre:"L'interrogation directe et indirecte",items:["Interrogative directe totale (oui/non) : inversion ou « est-ce que » — se termine par ?","Interrogative directe partielle (réponse précise) : adverbe (comment, pourquoi, quand, combien, où) ou pronom (qui, que, lequel)","Interrogative indirecte totale : introduite par « si » · pas d'inversion · pas de point d'interrogation","Interrogative indirecte partielle : mêmes mots interrogatifs · pas d'inversion · pas de ?","Valeurs de l'interrogative : demande d'information · assertion (valeur affirmative) · ordre / injonction"]},
  {titre:"La négation",items:["Négation grammaticale : NE + pas, point, plus, jamais, rien, personne, aucun, ni…ni","Négation totale : porte sur toute la proposition — ne…pas, ne…point, ne…nullement","Négation partielle : nie un aspect — ne…plus (passé/cessation), ne…jamais (fréquence), ne…guère, ne…rien","Négation exceptive : équivaut à « seulement » — ne…que (= restriction, pas une négation vraie)","Double négation : peut équivaloir à une affirmation — « il n'est rien qui n'ait sa mélancolie » = tout a sa mélancolie","Ne explétif : sans valeur négative réelle — « je crains qu'il ne vienne » = je crains qu'il vienne","Niveau de langue : l'absence du NE relève du registre familier oral"]},
  {titre:"La phrase complexe et les types de propositions",items:["Propositions juxtaposées : séparées par virgule, point-virgule ou deux points — lien implicite","Propositions coordonnées : reliées par une conjonction de coordination","Subordonnée conjonctive complétive : introduite par « que », COD du verbe principal","Subordonnée conjonctive circonstancielle : déplaçable et supprimable, exprime une circonstance","Subordonnée relative : introduite par pronom relatif, complète un antécédent","Subordonnée interrogative indirecte : dépend d'un verbe d'interrogation ou d'ignorance","Proposition participiale : sujet différent du principal, valeur de cause ou de temps"]},
];

/* ── STYLES ─────────────────────────────────────────────────────────────── */
const s={
  card:{background:'#fff',border:'0.5px solid #ddd',borderRadius:12,padding:'1.25rem'},
  label:{fontSize:11,textTransform:'uppercase',letterSpacing:'0.08em',color:'#888',display:'block',marginBottom:4},
  btn:{padding:'7px 16px',fontSize:13,fontWeight:500,borderRadius:8,border:'0.5px solid #ccc',background:'#f5f4f0',cursor:'pointer'},
  tab:a=>({padding:'7px 13px',fontSize:13,fontWeight:a?500:400,borderRadius:8,border:a?'0.5px solid #aaa':'0.5px solid transparent',background:a?'#fff':'transparent',color:a?'#1a1a18':'#888',cursor:'pointer'}),
  lvl:(a,c)=>({padding:'6px 13px',fontSize:12,fontWeight:a?600:400,borderRadius:20,border:`1px solid ${a?c:'#ddd'}`,background:a?c:'#f5f4f0',color:a?'#fff':'#888',cursor:'pointer'}),
};

/* ── COMPOSANT : ENTRETIEN (2e partie de l'oral) ────────────────────────── */
function Entretien(){
  const canvasRef=useRef();
  const [spinning,setSpinning]=useState(false);
  const [question,setQuestion]=useState(null);
  const [reponse,setReponse]=useState('');
  const [oeuvre,setOeuvre]=useState(null);
  const [tipsOpen,setTipsOpen]=useState(false);
  const [posees,setPosees]=useState([]);
  const angleRef=useRef(0);
  const animRef=useRef();

  const N=QUESTIONS_ORAL.length;
  const colors=['#8e44ad','#27ae60','#e67e22','#2980b9','#c0392b','#16a085','#d35400','#7f8c8d'];

  const draw=useCallback((angle)=>{
    const c=canvasRef.current;if(!c)return;
    const ctx=c.getContext('2d');
    const cx=c.width/2,cy=c.height/2,r=cy-4;
    ctx.clearRect(0,0,c.width,c.height);
    for(let i=0;i<N;i++){
      const a=angle+i*(2*Math.PI/N);
      ctx.beginPath();ctx.moveTo(cx,cy);
      ctx.arc(cx,cy,r,a,a+2*Math.PI/N);
      ctx.fillStyle=colors[i%colors.length];ctx.fill();
      ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke();
    }
    ctx.beginPath();ctx.moveTo(cx+r-4,cy);ctx.lineTo(cx+r+12,cy-8);ctx.lineTo(cx+r+12,cy+8);
    ctx.fillStyle='#1a1a18';ctx.fill();
    ctx.beginPath();ctx.arc(cx,cy,18,0,2*Math.PI);
    ctx.fillStyle='#fff';ctx.fill();
    ctx.font='bold 11px system-ui';ctx.fillStyle='#1a1a18';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('🎯',cx,cy);
  },[N]);

  useEffect(()=>{draw(0);},[draw]);

  const spin=()=>{
    if(spinning)return;
    setSpinning(true);setQuestion(null);setReponse('');
    const extra=4*Math.PI+Math.random()*4*Math.PI;
    const start=performance.now();
    const dur=3000+Math.random()*1000;
    const startA=angleRef.current;
    const animate=now=>{
      const t=Math.min((now-start)/dur,1);
      const ease=1-Math.pow(1-t,3);
      const a=startA+extra*ease;
      angleRef.current=a%(2*Math.PI);
      draw(angleRef.current);
      if(t<1){animRef.current=requestAnimationFrame(animate);}
      else{
        setSpinning(false);
        const normalized=((2*Math.PI-angleRef.current)%(2*Math.PI));
        const idx=Math.floor(normalized/(2*Math.PI/N))%N;
        const q=QUESTIONS_ORAL[idx];
        setQuestion(q);
        setPosees(p=>p.includes(q)?p:[...p,q]);
      }
    };
    animRef.current=requestAnimationFrame(animate);
  };

  useEffect(()=>()=>{cancelAnimationFrame(animRef.current);},[]);

  const oeuvres=[
    {id:'theatre',label:'Théâtre',c:'#8e44ad',info:OBJETS_INFO.theatre},
    {id:'poesie',label:'Poésie',c:'#27ae60',info:OBJETS_INFO.poesie},
    {id:'roman',label:'Roman',c:'#e67e22',info:OBJETS_INFO.roman},
    {id:'idees',label:"Idées",c:'#2980b9',info:OBJETS_INFO.idees},
  ];

  return(
    <div>
      <div style={{...s.card,marginBottom:'1rem',background:'#fffaf0',borderColor:'#f4d8a4'}}>
        <p style={{fontSize:13,lineHeight:1.7,color:'#7d4f10',margin:0}}>
          <strong>L'entretien (≈ 10 min)</strong> commence par une présentation personnelle de ton œuvre choisie (2–3 min), puis le jury te pose des questions pendant ≈ 8 min.
        </p>
      </div>

      <div style={{marginBottom:'1rem'}}>
        <span style={s.label}>1. Choisis l'œuvre sur laquelle tu t'entraînes</span>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginTop:6}}>
          {oeuvres.map(o=>(
            <button key={o.id} onClick={()=>setOeuvre(o)} style={{padding:'10px 12px',fontSize:13,borderRadius:8,border:`1px solid ${oeuvre?.id===o.id?o.c:'#ddd'}`,background:oeuvre?.id===o.id?o.c+'15':'#fff',cursor:'pointer',textAlign:'left',color:oeuvre?.id===o.id?o.c:'#444',fontWeight:oeuvre?.id===o.id?500:400}}>
              <div style={{fontSize:11,textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:2}}>{o.label}</div>
              <div style={{fontSize:13}}>{o.info.auteur}</div>
              <div style={{fontSize:12,fontStyle:'italic',opacity:0.75}}>{o.info.oeuvre}</div>
            </button>
          ))}
        </div>
      </div>

      <button onClick={()=>setTipsOpen(o=>!o)} style={{...s.btn,marginBottom:'1rem',width:'100%',textAlign:'left',fontSize:13}}>
        💡 Conseils pour la présentation de l'œuvre (2–3 min) {tipsOpen?'▲':'▼'}
      </button>
      {tipsOpen&&(
        <div className="fade" style={{...s.card,marginBottom:'1rem',background:'#f0f4ff',borderColor:'#c3cfe2'}}>
          <p style={{fontSize:12,fontWeight:600,color:'#1a5276',marginBottom:8,textTransform:'uppercase',letterSpacing:'0.05em'}}>✅ Une présentation efficace</p>
          <ul style={{margin:'0 0 12px 16px',fontSize:13,lineHeight:1.75,color:'#1a1a18'}}>
            <li>Une présentation <em>personnelle</em>, justifiée par des références précises à l'œuvre</li>
            <li>Caractéristiques principales (auteur, titre, genre, époque, sujet)</li>
            <li>Intérêt et particularités de l'œuvre</li>
            <li>Avis argumenté + étayé par des références</li>
          </ul>
          <p style={{fontSize:12,fontWeight:600,color:'#a93226',marginBottom:8,textTransform:'uppercase',letterSpacing:'0.05em'}}>❌ Ce qu'il ne faut pas faire</p>
          <ul style={{margin:'0 0 12px 16px',fontSize:13,lineHeight:1.75,color:'#1a1a18'}}>
            <li>La récitation d'une fiche de lecture impersonnelle</li>
            <li>La récitation d'un cours</li>
            <li>Un résumé complet de l'intrigue</li>
          </ul>
          <p style={{fontSize:12,fontWeight:600,color:'#1a5276',marginBottom:6,textTransform:'uppercase',letterSpacing:'0.05em'}}>Adjectifs utiles</p>
          <p style={{fontSize:12,color:'#555',lineHeight:1.7,fontStyle:'italic'}}>comique · réaliste · vivant · poétique · critique · ironique · parodique · pathétique · lyrique · engagé · universel · ambigu · bouleversant · dépaysant · actuel</p>
        </div>
      )}

      <div style={{marginBottom:'0.75rem'}}>
        <span style={s.label}>2. Lance la roue pour t'entraîner aux questions du jury</span>
      </div>
      <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:'1rem',marginBottom:'1.25rem'}}>
        <canvas ref={canvasRef} width={260} height={260} style={{borderRadius:'50%',boxShadow:'0 2px 12px rgba(0,0,0,0.15)'}}/>
        <button onClick={spin} disabled={spinning} style={{...s.btn,background:spinning?'#ccc':'#1a1a18',color:'#fff',border:'none',padding:'10px 28px',fontSize:14,fontWeight:600}}>
          {spinning?'La roue tourne…':'🎯 Lancer la roue'}
        </button>
        {posees.length>0&&<p style={{fontSize:11,color:'#888'}}>{posees.length} / {N} questions déjà tirées</p>}
      </div>

      {question&&(
        <div className="fade" style={s.card}>
          <p style={{fontSize:11,textTransform:'uppercase',letterSpacing:'0.08em',color:oeuvre?.c||'#e67e22',marginBottom:8,fontWeight:600}}>
            Question tirée au sort{oeuvre&&` — sur ${oeuvre.info.oeuvre}`}
          </p>
          <p style={{fontSize:16,fontWeight:500,lineHeight:1.6,marginBottom:'1rem',color:'#1a1a18'}}>« {question} »</p>
          <label style={s.label}>Ta réponse (un paragraphe argumenté avec exemples précis)</label>
          <textarea value={reponse} onChange={e=>setReponse(e.target.value)} placeholder={oeuvre?`Réponds en t'appuyant sur des exemples précis tirés de ${oeuvre.info.oeuvre}…`:"Choisis d'abord une œuvre puis rédige ta réponse…"} style={{minHeight:140}}/>
          {reponse.length>20&&<p style={{fontSize:12,color:'#888',marginTop:6}}>{reponse.length} caractères — relis-toi à voix haute avant de passer à la suivante.</p>}
          <button onClick={()=>{setQuestion(null);setReponse('');}} style={{...s.btn,marginTop:'0.75rem',fontSize:12}}>Nouvelle question →</button>
        </div>
      )}

      {posees.length>=5&&(
        <details style={{marginTop:'1rem'}}>
          <summary style={{cursor:'pointer',fontSize:12,color:'#888',padding:'8px'}}>Voir les {posees.length} questions déjà tirées</summary>
          <ul style={{margin:'8px 0 0 20px',fontSize:12,color:'#666',lineHeight:1.6}}>
            {posees.map((q,i)=><li key={i}>{q}</li>)}
          </ul>
        </details>
      )}
    </div>
  );
}

/* ── COMPOSANT : QUIZ GÉNÉRIQUE ─────────────────────────────────────────── */
function QuizGeneric({data,niveaux}){
  const firstNiv=niveaux[0][0];
  const [niv,setNiv]=useState(firstNiv);
  const [qi,setQi]=useState(0);
  const [score,setScore]=useState(0);
  const [ans,setAns]=useState(null);
  const [rep,setRep]=useState('');
  const [done,setDone]=useState(false);
  const [showEx,setShowEx]=useState(false);

  const n=data[niv]||{questions:[]};
  const q=n.questions[qi];
  const changeNiv=v=>{setNiv(v);setQi(0);setScore(0);setAns(null);setRep('');setDone(false);setShowEx(false);};
  const handleQCM=i=>{if(ans!==null)return;setAns(i);if(i===q.r)setScore(s=>s+1);};
  const nextQ=()=>{setQi(q=>q+1);setAns(null);setRep('');setShowEx(false);};
  const nextDone=()=>setDone(true);
  const reset=()=>{setQi(0);setScore(0);setAns(null);setRep('');setDone(false);setShowEx(false);};

  if(!n.questions.length)return<div style={s.card}><p style={{fontSize:13,color:'#888'}}>Quiz à venir.</p></div>;

  return(
    <div>
      <div style={{display:'flex',gap:8,marginBottom:'1rem',flexWrap:'wrap'}}>
        {niveaux.map(([k])=>data[k]&&<button key={k} onClick={()=>changeNiv(k)} style={s.lvl(niv===k,data[k].c)}>{data[k].label}</button>)}
      </div>
      <div style={s.card}>
        {!done?(
          <>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:'0.75rem'}}>
              <span style={{fontSize:12,color:'#888'}}>Question {qi+1} / {n.questions.length}</span>
              <span style={{fontSize:12,color:'#888'}}>Score : {score}</span>
            </div>
            <div style={{background:'#f5f4f0',borderRadius:8,padding:'0.75rem 1rem',marginBottom:'1rem'}}>
              <p style={{fontSize:15,fontWeight:500,lineHeight:1.5}}>{q.q}</p>
            </div>
            {q.o?(
              <>
                <div style={{display:'flex',flexDirection:'column',gap:8}}>
                  {q.o.map((opt,i)=>{
                    let bg='#fff',bc='#ddd',col='#1a1a18';
                    if(ans!==null){if(i===q.r){bg='#eafaf1';bc='#27ae60';col='#1a6b3a';}else if(i===ans){bg='#fdf0ef';bc='#e74c3c';col='#a93226';}}
                    return<button key={i} onClick={()=>handleQCM(i)} style={{textAlign:'left',padding:'10px 14px',fontSize:14,borderRadius:8,border:`0.5px solid ${bc}`,background:bg,color:col,cursor:ans===null?'pointer':'default',lineHeight:1.5}}>{opt}</button>;
                  })}
                </div>
                {ans!==null&&q.ex&&(
                  <div style={{marginTop:'0.75rem'}}>

function GrammaireEL({questions}){
  const [qi,setQi]=useState(0);
  const [ans,setAns]=useState(null);
  const [rep,setRep]=useState('');
  const [showEx,setShowEx]=useState(false);
  const [done,setDone]=useState(false);
  const q=questions[qi];

  const nextQ=()=>{setQi(i=>i+1);setAns(null);setRep('');setShowEx(false);};
  const finish=()=>setDone(true);
  const reset=()=>{setQi(0);setAns(null);setRep('');setShowEx(false);setDone(false);};

  if(done)return(
    <div style={{marginTop:'0.75rem',padding:'1rem',background:'#f0fff4',borderRadius:8,textAlign:'center'}}>
      <p style={{fontSize:14,color:'#27ae60',fontWeight:500,marginBottom:8}}>✓ Exercices terminés</p>
      <button onClick={reset} style={{...s.btn,fontSize:12}}>Recommencer</button>
    </div>
  );

  return(
    <div style={{marginTop:'0.75rem',padding:'0.75rem',background:'#f0f4ff',borderRadius:8,border:'0.5px solid #c3cfe2'}}>
      <p style={{fontSize:11,color:'#888',marginBottom:8}}>Question {qi+1} / {questions.length}</p>
      <p style={{fontSize:14,fontWeight:500,lineHeight:1.55,marginBottom:'0.75rem',color:'#1a1a18'}}>{q.q}</p>
      {q.type==='qcm'?(
        <>
          <div style={{display:'flex',flexDirection:'column',gap:6}}>
            {q.o.map((opt,i)=>{
              let bg='#fff',bc='#ddd',col='#1a1a18';
              if(ans!==null){if(i===q.r){bg='#eafaf1';bc='#27ae60';col='#1a6b3a';}else if(i===ans){bg='#fdf0ef';bc='#e74c3c';col='#a93226';}}
              return<button key={i} onClick={()=>{if(ans===null)setAns(i);}} style={{textAlign:'left',padding:'8px 12px',fontSize:13,borderRadius:7,border:`0.5px solid ${bc}`,background:bg,color:col,cursor:ans===null?'pointer':'default',lineHeight:1.4}}>{opt}</button>;
            })}
          </div>
          {ans!==null&&q.ex&&(
            <div style={{marginTop:8}}>
              <button onClick={()=>setShowEx(e=>!e)} style={{...s.btn,fontSize:11}}>{showEx?'Masquer':'Voir l\'analyse grammaticale'}</button>
              {showEx&&<p style={{marginTop:8,fontSize:13,lineHeight:1.7,color:'#1a5276'}}>{q.ex}</p>}
            </div>
          )}
          {ans!==null&&(
            <button onClick={qi+1>=questions.length?finish:nextQ} style={{...s.btn,marginTop:8,fontSize:12}}>
              {qi+1>=questions.length?'Terminer':'Question suivante →'}
            </button>
          )}
        </>
      ):(
        <>
          <textarea value={rep} onChange={e=>setRep(e.target.value)} placeholder="Rédigez votre analyse grammaticale…" style={{fontSize:13,minHeight:100}}/>
          {rep.length>10&&<button onClick={qi+1>=questions.length?finish:nextQ} style={{...s.btn,marginTop:8,fontSize:12,display:'block'}}>
            {qi+1>=questions.length?'Terminer':'Question suivante →'}
          </button>}
        </>
      )}
    </div>
  );
}

/* ── GRAMMAIRE ──────────────────────────────────────────────────────────── */
function Grammaire(){
  const [tab,setTab]=useState('fiches');

  const [open,setOpen]=useState(0);

  // Quiz grammaire : questions tirées des EL
  const QUIZ_GRAM={
    n1:{label:'Niveau 1 — Notions fondamentales',c:'#27ae60',questions:[
      {type:'qcm',q:"Quelle est la nature de « que » dans « Des mots qu'on n'a pas eus » (Sarraute, EL 3) ?",o:["Conjonction de subordination","Pronom relatif COD","Adverbe interrogatif","Pronom interrogatif"],r:1,ex:"Pronom relatif : il reprend l'antécédent « des mots » et a la fonction COD du verbe « a eus » dans la relative."},
      {type:'qcm',q:"Dans « puisque nous en sommes là » (Sarraute, EL 4), quelle est la nature de « puisque » ?",o:["Conjonction de coordination","Adverbe","Conjonction de subordination introduisant une circonstancielle de cause","Pronom relatif"],r:2,ex:"Conjonction de subordination introduisant une proposition subordonnée conjonctive circonstancielle de cause. « Puisque » exprime une cause connue et partagée par les deux interlocuteurs."},
      {type:'qcm',q:"Dans « Le soleil des vivants n'échauffe plus les morts » (Lamartine, EL 5), quelle est la valeur du présent de l'indicatif ?",o:["Présent d'actualité","Présent de narration","Présent de vérité générale (gnomique)","Présent futur proche"],r:2,ex:"Présent de vérité générale ou gnomique : ce vers énonce une loi universelle, une sentence immuable. Ce n'est pas une action en cours mais une vérité présentée comme permanente."},
      {type:'qcm',q:"Dans « Vous semez vos champs pour qu'il les dévaste » (La Boétie, EL 14), quel est le mode de « dévaste » ?",o:["Indicatif présent","Subjonctif présent","Conditionnel présent","Impératif présent"],r:1,ex:"Subjonctif présent. Le mode subjonctif est obligatoire dans les propositions subordonnées circonstancielles de but (introduites par « pour que », « afin que »...). Il exprime ici un but ou une intention présentée comme finalisée."},
      {type:'qcm',q:"Dans « Ce maître n'a pourtant que deux yeux, deux mains » (La Boétie, EL 14), quelle est la valeur de « ne... que » ?",o:["Négation totale","Négation exceptive (équivaut à « seulement »)","Négation partielle","Négation lexicale"],r:1,ex:"Négation exceptive : « ne... que » équivaut à « seulement ». Ce n'est pas une négation au sens plein — elle restreint (il a seulement deux yeux, deux mains), ne nie pas. C'est différent de la négation totale (ne...pas, ne...jamais)."},
    ]},
    n2:{label:'Niveau 2 — Application aux textes',c:'#e67e22',questions:[
      {type:'qcm',q:"Dans « elle voulait que mes cheveux fussent accommodés » (Prévost, EL 12), quel est le mode et le temps de « fussent accommodés » ?",o:["Subjonctif imparfait passif","Indicatif imparfait passif","Conditionnel présent passif","Subjonctif présent passif"],r:0,ex:"Subjonctif imparfait passif : auxiliaire être au subjonctif imparfait (fussent, 3e pers. pl.) + participe passé (accommodés). Le subjonctif est obligatoire après un verbe de volonté ; l'imparfait marque la concordance des temps (verbe principal au passé)."},
      {type:'qcm',q:"Dans « Rien qu'on puisse dire » (Sarraute, EL 2), quelle est la nature de la proposition « qu'on puisse dire » ?",o:["Proposition subordonnée relative adjective après négation absolue","Proposition subordonnée complétive","Proposition principale","Proposition circonstancielle de but"],r:0,ex:"Proposition subordonnée relative adjective épithète de l'antécédent « rien ». Elle est introduite par le pronom relatif « que » (COD de « dire »). Le subjonctif est obligatoire dans une relative dépendant de « rien » (négation absolue). Elle est déterminative."},
      {type:'qcm',q:"Dans « on ne pourra pas toujours / ne pas recommencer » (Dorion, EL 7), que résulte-t-il de la double négation ?",o:["Une affirmation renforcée : on recommencera forcément","Une négation totale : on ne recommencera jamais","Une interrogation rhétorique","Une atténuation"],r:0,ex:"Double négation qui produit une affirmation : « ne pas pouvoir ne pas + infinitif » = « être obligé de + infinitif ». On ne pourra pas toujours éviter de recommencer = on sera obligé de recommencer. C'est un procédé logique : NEG(NEG) = affirmation."},
      {type:'qcm',q:"Dans « le temps jamais ne s'arrête / nous dit l'arbre » (Dorion, EL 8), quelle est la nature de « nous dit l'arbre » ?",o:["Une proposition principale","Une proposition incise (indiquant l'auteur du discours direct)","Une proposition subordonnée relative","Une proposition subordonnée complétive"],r:1,ex:"Proposition incise (ou incidente) : elle s'intercale pour indiquer l'auteur des paroles en discours direct, sans être ni principale ni subordonnée. C'est une structure caractéristique du discours direct rapporté."},
      {type:'qcm',q:"Dans « Souvent sur la montagne, à l'ombre du vieux chêne, / Au coucher du soleil, tristement je m'assieds » (Lamartine, EL 5), quelle est la fonction grammaticale de « sur la montagne » et « à l'ombre du vieux chêne » ?",o:["Compléments d'objet indirect (COI)","Compléments circonstanciels de lieu","Attributs du sujet","Compléments du nom « soleil »"],r:1,ex:"Compléments circonstanciels de lieu : ils indiquent l'endroit où se passe l'action. Ils sont déplaçables (on pourrait les mettre après le verbe) et supprimables sans altérer la structure fondamentale de la phrase."},
    ]},
    n3:{label:'Niveau 3 — Approfondissement',c:'#8e44ad',questions:[
      {type:'qcm',q:"Dans « Ces six cents en tiennent sous leur dépendance six mille, qu'ils élèvent en dignité » (La Boétie, EL 15), quelle est la nature de la proposition « qu'ils élèvent en dignité » ?",o:["Proposition subordonnée relative adjective épithète de « six mille »","Proposition subordonnée complétive COD de « tiennent »","Proposition subordonnée circonstancielle de but","Proposition principale"],r:0,ex:"Proposition subordonnée relative adjective épithète. Pronom relatif « que » = COD de « élèvent » ; antécédent = « six mille ». Relative déterminative : elle précise de quels six mille il s'agit. Ne peut être supprimée sans changer le sens."},
      {type:'redige',q:"Dans « tu m'as dit : « C'est bien... ça... » » (Sarraute, EL 3), identifiez le type de discours rapporté, puis analysez la valeur grammaticale des points de suspension après « bien » et avant « ça »."},
      {type:'qcm',q:"Dans « J'en arrive maintenant à un point qui est, selon moi, le ressort et le secret de la domination » (La Boétie, EL 15), quelle est la nature de « selon moi » ?",o:["Proposition subordonnée circonstancielle de cause","Groupe adverbial à valeur modalisante (exprime le point de vue du locuteur)","Complément d'objet indirect","Proposition incise indiquant un verbe de parole"],r:1,ex:"Groupe adverbial à valeur modalisante (ou modalisateur) : « selon moi » indique que ce qui suit est le point de vue personnel de l'auteur, non une vérité objective. Il est déplaçable et supprimable. C'est un modalisateur épistémique qui engage l'auteur dans son argumentation."},
      {type:'qcm',q:"Dans « Il faut du temps pour que ça revienne, cette pulsation, un pouls qui se remet à battre » (Sarraute, EL 4), analysez la structure de « cette pulsation, un pouls qui se remet à battre » : quel est son rapport avec le reste de la phrase ?",o:["Ce sont des appositions au sujet implicite « ça »","Ce sont des COD du verbe « revienne »","Ce sont des attributs du sujet","Ce sont des compléments circonstanciels de manière"],r:0,ex:"Appositions (ou reprises en apposition) au pronom « ça » : elles précisent, développent, définissent ce que désigne « ça » en ajoutant une dénomination plus concrète et plus imagée. L'apposition est une construction nominale non reliée par une préposition, qui entretient une relation d'équivalence avec son antécédent."},
    ]},
  };

  return(
    <div>
      <div style={{display:'flex',gap:6,marginBottom:'1.25rem',flexWrap:'wrap'}}>
        {[['fiches','📌 Fiches de grammaire'],['quiz','🎯 Quiz de grammaire']].map(([k,l])=>(

            {GRAM_NOTIONS.map((n,i)=>(
              <div key={i} style={{...s.card,padding:0,overflow:'hidden'}}>
                <button onClick={()=>setOpen(open===i?-1:i)} style={{width:'100%',textAlign:'left',padding:'1rem 1.25rem',background:'none',border:'none',cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <span style={{fontSize:14,fontWeight:500}}>📌 {n.titre}</span>
                  <span style={{color:'#888'}}>{open===i?'▲':'▼'}</span>
                </button>
                {open===i&&(
                  <div style={{padding:'0 1.25rem 1.25rem',borderTop:'0.5px solid #eee'}}>
                    <ul style={{margin:'0.75rem 0 0 16px',fontSize:13,lineHeight:1.9,color:'#444'}}>{n.items.map((it,k)=><li key={k}>{it}</li>)}</ul>
                  </div>
                )}
              </div>
            ))}
          </div>
        </div>
      )}
      {tab==='quiz'&&<QuizGeneric data={QUIZ_GRAM} niveaux={niveaux}/>}
    </div>
  );
}

/* ── APP ────────────────────────────────────────────────────────────────── */
function App(){
  const [view,setView]=useState('home');
  const [cur,setCur]=useState(null);
  const home=()=>{setView('home');setCur(null);};
  return(
    <div style={{maxWidth:740,margin:'0 auto',padding:'2rem 1rem'}}>
      <div style={{cursor:'pointer'}} onClick={home}>
        <h1 style={{fontSize:20,fontWeight:500,marginBottom:4}}>Révision oral de bac — Français</h1>
        <p style={{fontSize:13,color:'#888',marginBottom:'1.5rem'}}>Lycée Jean Prévost · 1ères G · Mme Berger</p>
      </div>
      {view==='home'&&(
        <div>
          <p style={{fontSize:13,color:'#666',marginBottom:'1.25rem',lineHeight:1.6}}>Choisis un objet d'étude pour accéder aux cours, aux EL et aux quiz.</p>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:'1.5rem'}}>
            {OBJETS.map(o=>{
              const info=OBJETS_INFO[o.id];
              return(
                <div key={o.id} onClick={()=>{setCur(o);setView('objet');}} style={{cursor:'pointer',padding:'1.25rem 1rem',borderRadius:12,border:`1px solid ${o.c}40`,background:o.c+'10',transition:'all 0.15s'}}
                  onMouseEnter={e=>{e.currentTarget.style.background=o.c+'22';e.currentTarget.style.transform='translateY(-2px)';}}
                  onMouseLeave={e=>{e.currentTarget.style.background=o.c+'10';e.currentTarget.style.transform='translateY(0)';}}>
                  <p style={{fontSize:11,textTransform:'uppercase',letterSpacing:'0.08em',color:o.c,fontWeight:600,marginBottom:6}}>{o.label}</p>
                  <p style={{fontSize:14,fontWeight:500,marginBottom:2}}>{info.auteur}</p>
                  <p style={{fontSize:13,fontStyle:'italic',color:'#444',marginBottom:6}}>{info.oeuvre}</p>
                  <p style={{fontSize:11,color:'#888'}}>Parcours : {info.parcours}</p>
                  {o.music&&<p style={{fontSize:10,color:o.c,marginTop:4}}>🎵 Musique disponible</p>}
                </div>
              );
            })}
          </div>
          <div style={{borderTop:'0.5px solid #eee',paddingTop:'1.25rem'}}>
            <p style={{fontSize:11,textTransform:'uppercase',letterSpacing:'0.08em',color:'#888',fontWeight:600,marginBottom:10}}>Outils transversaux</p>
            <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
              <button onClick={()=>setView('entretien')} style={{...s.btn,background:'#1a1a18',color:'#fff',border:'none',fontWeight:500}}>🎡 Entretien (2ᵉ partie)</button>
              <button onClick={()=>setView('methode')} style={s.btn}>📐 Méthode de l'oral</button>
              <button onClick={()=>setView('grammaire')} style={s.btn}>📌 Grammaire</button>
            </div>
          </div>
        </div>
      )}
      {view==='objet'&&cur&&<ObjetModule objet={cur} onBack={home}/>}
      {(view==='methode'||view==='grammaire'||view==='entretien')&&(
        <div>
          <button onClick={home} style={{...s.btn,marginBottom:'1rem',fontSize:12}}>← Retour à l'accueil</button>
          {view==='entretien'&&<Entretien/>}
          {view==='methode'&&<Methode/>}
          {view==='grammaire'&&<Grammaire/>}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
