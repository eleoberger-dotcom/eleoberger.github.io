    extrait:"La nuit s'approfondit\net l'on se met à rêver\ndu haut des falaises de Rilke\ndans la forêt de Dante\non voit le passé\ndéjà on lit le futur\n[…]\non traverse le bois de Walden\nla mémoire des saisons de Zanzotto\nles paysages intérieurs\nd'Hopkins les clairières de Zambrano\nvers la connaissance de soi\non a marché on s'est plongé\ndans le long travail de l'amour\non a trébuché\nrebondi puis chuté de nouveau\nle temps jamais ne s'arrête\nnous dit l'arbre\n nous dit la forêt\net sur la branche du présent\nun poème murmure\nun chemin vaste et lumineux\nqui donne sens\nà ce qu'on appelle humanité",
    problematique:"Comment Hélène Dorion transforme-t-elle la fin de son recueil en art poétique ?",

      {label:'v. 14–21',titre:"L'épreuve du temps",procedes:["Passé composé « on a marché » — bilan rétrospectif","Verbes successifs : trébuché, rebondi, chuté — chemin non linéaire","Typographie imitative : enjambements qui miment la chute","Parallélisme « nous dit l'arbre / nous dit la forêt » — prosopopée"]},
      {label:'v. 22–fin',titre:"Le rôle salvateur de la poésie",procedes:["Métaphore « sur la branche du présent » — instant précaire","Monostiche « un poème murmure » — humilité","COD inattendu « un chemin vaste et lumineux » — le poème devient chemin","Subordonnée relative « qui donne sens » — fonction de la poésie selon Dorion"]}

    grammaire:{enonce:"Dans « le temps jamais ne s'arrête / nous dit l'arbre » (v. 19–20), analysez la structure de la phrase et identifiez la figure de style principale.",reponse:"« nous dit l'arbre » est une proposition incise (ou incidente), indiquant l'auteur des paroles. Il s'agit d'un discours direct sans guillemets — caractéristique du style de Dorion. La prosopopée (l'arbre qui parle) est renforcée par l'incise qui valide ce discours comme celui d'un locuteur ordinaire. L'antéposition « jamais » accentue la valeur de vérité générale."}

  {id:12,objet:'roman',numero:'EL 12',titre:"L'épisode du Prince Italien",auteur:'Abbé Prévost',date:'1753',parcours:'Personnages en marge, plaisirs du romanesque',mouvement:'Roman du XVIIIe siècle',
    extrait:"À mon réveil, Manon me déclara que, pour passer le jour dans notre appartement, elle ne prétendait pas que j'en eusse l'air plus négligé, et qu'elle voulait que mes cheveux fussent accommodés de ses propres mains. […] Ce badinage nous occupa jusqu'à l'heure du dîner. Le goût qu'elle y avait pris m'avait paru si naturel, et sa gaieté sentait si peu l'artifice […]\n– Quoi donc ? m'écriai-je. Qui ? Quel prince ?\nElle ne répondit point à mes questions.\n– Faites-le monter, dit-elle froidement au valet ; et se tournant vers moi :\n– Cher amant, toi que j'adore, reprit-elle d'un ton enchanteur, je te demande un moment de complaisance, un moment, un seul moment.\n[…] elle empoigna d'une main mes cheveux, prit de l'autre son miroir de toilette ; l'ouvrant du genou, elle offrit à l'étranger un spectacle qui ne dut pas lui causer peu d'étonnement. […]\n– Voyez, monsieur, regardez-vous bien, et rendez-moi justice. Voici l'homme que j'aime, et que j'ai juré d'aimer toute ma vie. Faites la comparaison vous-même.",
    problematique:"Comment Prévost fait-il de cette scène intime une véritable mise en scène théâtrale où Manon s'affirme comme maîtresse du jeu ?",
    etapes:[
      {label:'L. 1–11',titre:"Le jeu de Manon et l'aveuglement de des Grieux",procedes:["Subjonctif de volonté « elle voulait que mes cheveux fussent » — Manon contrôle","Terme « amusement » — registre ludique qui endort la vigilance","Comparatif de supériorité « plus de soins que je ne lui en avais vu » — indice de préméditation","Adverbes « si naturel / si peu l'artifice » — aveuglement de des Grieux","Antithèse naturel/artifice — thème central du roman"]},
      {label:'L. 12–19',titre:"L'affrontement verbal",procedes:["Phrases exclamatives brèves « Quoi ? Qui ? Quel prince ? » — stupéfaction, colère","Silence de Manon « ne répondit point » — stratégie, contrôle absolu","Adverbe « froidement » — sang-froid contrastant avec l'émotion de des Grieux","Registre amoureux précieux : « Cher amant, toi que j'adore »","Épanorthose « un moment, un seul moment » — minimisation rhétorique"]},
      {label:'L. 20–fin',titre:'Le coup de théâtre : Manon triomphante',procedes:["Verbe violent « empoigna » — les cheveux deviennent accessoire de scène","Détail comique « l'ouvrant du genou » — registre de la farce","Terme « spectacle » — dimension théâtrale, Manon metteuse en scène","Litote « ne dut pas lui causer peu d'étonnement »","Impératifs cinglants « Voyez / regardez-vous / Faites la comparaison »","Miroir — accessoire qui passe de coquetterie à instrument de mise en scène"]}
    ],
    grammaire:{enonce:"Dans « elle voulait que mes cheveux fussent accommodés de ses propres mains » (l. 2–3), analysez le mode et la valeur de « fussent accommodés ».",reponse:"Subjonctif imparfait passif (auxiliaire être « fussent » + participe passé « accommodés »). Il est dans une proposition subordonnée conjonctive complétive (COD du verbe de volonté « voulait »). Le subjonctif après un verbe de volonté est obligatoire. L'imparfait marque la concordance des temps (récit au passé). Cela donne à la volonté de Manon une coloration autoritaire et préméditation."}
  },
  {id:14,objet:'idees',numero:'EL 14',titre:"« Pauvres gens misérables »",auteur:'Étienne de La Boétie',date:'1576',parcours:'Défendre et entretenir la liberté',mouvement:'Humanisme / Renaissance',
    extrait:"Pauvres gens misérables, peuples insensés, nations opiniâtres à votre mal et aveugles à votre bien ! Vous vous laissez enlever sous vos yeux le plus beau et le plus clair de votre revenu, vous laissez piller vos champs, voler et dépouiller vos maisons […] Et tous ces dégâts, ces malheurs, cette ruine, ne vous viennent pas des ennemis, mais certes bien de l'ennemi, de celui-là même que vous avez fait ce qu'il est […] Ce maître n'a pourtant que deux yeux, deux mains, un corps, et rien de plus que n'a le dernier des habitants. […] D'où tire-t-il tous ces yeux qui vous épient, si ce n'est de vous ? Comment a-t-il tant de mains pour vous frapper, s'il ne vous les emprunte ? […] Vous semez vos champs pour qu'il les dévaste, vous meublez vos maisons pour fournir ses pilleries, vous élevez vos filles afin qu'il puisse assouvir sa luxure […] Soyez résolus à ne plus servir, et vous voilà libres. […] vous le verrez, tel un grand colosse dont on a brisé la base, fondre sous son poids et se rompre.",
    problematique:"Comment La Boétie dénonce-t-il la responsabilité du peuple dans sa propre servitude ?",
    etapes:[
      {label:'L. 1–5',titre:'Le constat des dépossessions',procedes:["Apostrophe + gradation ternaire : « gens, peuples, nations »","Antithèse « mal / bien » — aveuglement pathologique","Anaphore « vous laissez » — la passivité comme responsabilité","Énumération des verbes de dépossession : « enlever, piller, voler, dépouiller »"]},
      {label:'L. 6–14',titre:'Le responsable : le maître créé par le peuple lui-même',procedes:["Antithèse « des ennemis » (pluriel) / « de l'ennemi » (singulier défini)","Proposition relative « celui-là même que vous avez fait ce qu'il est » — thèse centrale","Négation restrictive « n'a que deux yeux, deux mains » — désacralisation du tyran","Série de questions rhétoriques — imposition d'une évidence","Métonymies « yeux, mains, pieds » — le peuple fournit ses propres instruments d'oppression"]},
      {label:'L. 15–fin',titre:'La solution : maxime finale',procedes:["Anaphore « Vous semez / vous meublez / vous élevez / vous nourrissez »","Subordonnées de but (« pour que », « afin que ») — actes présentés comme intentionnels","Maxime « Soyez résolus à ne plus servir, et vous voilà libres »","Comparaison finale « tel un grand colosse » — allusion biblique"]}
    ],
    grammaire:{enonce:"Dans « Vous semez vos champs pour qu'il les dévaste » (l. 15), analysez la nature et la valeur de la proposition « pour qu'il les dévaste ».",reponse:"Proposition subordonnée conjonctive circonstancielle de but, introduite par la locution conjonctive « pour que ». Le verbe est au subjonctif (mode obligatoire dans les subordonnées de but). La Boétie présente comme une finalité volontaire ce qui n'est que le résultat de la passivité du peuple, ce qui renforce l'accusation de complicité."}
  },
  {id:15,objet:'idees',numero:'EL 15',titre:"« Cinq ou six »",auteur:'Étienne de La Boétie',date:'1576',parcours:'Défendre et entretenir la liberté',mouvement:'Humanisme / Renaissance',
    extrait:"J'en arrive maintenant à un point qui est, selon moi, le ressort et le secret de la domination […] Ce ne sont pas les bandes de gens à cheval, les compagnies de fantassins, ce ne sont pas les armes qui défendent un tyran, mais toujours quatre ou cinq hommes qui le soutiennent. Il en a toujours été ainsi : cinq ou six ont eu l'oreille du tyran […] Ces six en ont sous eux six cents, qu'ils corrompent autant qu'ils ont corrompu le tyran. Ces six cents en tiennent sous leur dépendance six mille, qu'ils élèvent en dignité. […] non pas six mille, mais cent mille et des millions tiennent au tyran par cette chaîne ininterrompue […] En somme, par les gains et les faveurs qu'on reçoit des tyrans, on en arrive à ce point qu'ils se trouvent presque aussi nombreux, ceux auxquels la tyrannie profite, que ceux auxquels la liberté plairait.",
    problematique:"Comment La Boétie dévoile-t-il les mécanismes concrets de la tyrannie et montre-t-il qu'elle repose sur une corruption organisée en cascade ?",
    etapes:[
      {label:'L. 1–10',titre:'La formulation de la thèse',procedes:["Annonce solennelle « le ressort et le secret » — révélation attendue","Réfutation de l'opinion commune : les armées ne protègent pas le tyran","Image de l'« épouvantail » — parade illusoire","Exemple historique des empereurs romains","Antithèse numérique : armées / « quatre ou cinq hommes »"]},
      {label:'L. 11–25',titre:'La pyramide de la corruption',procedes:["Adverbe « toujours » — loi universelle","Champ lexical du vice : « cruautés, plaisirs, voluptés, rapines »","Verbe « dresser » (dressage animalier) — les six éduquent le tyran","Progression géométrique : 6 → 600 → 6000 — mathématique de la corruption","Métaphore de la chaîne — solidarité et servitude"]},
      {label:'L. 25–fin',titre:'La conclusion amère',procedes:["Connecteur conclusif « en somme »","Comparaison d'égalité « aussi nombreux que »","Conditionnel « plairait » vs. présent « profite » — réel vs. désir","Phrase finale désenchantée — la servitude est devenue un intérêt partagé"]}
    ],
    grammaire:{enonce:"Dans « Ces six cents en tiennent sous leur dépendance six mille, qu'ils élèvent en dignité » (l. 15), analysez la nature et la fonction de la proposition introduite par « qu' ».",reponse:"Proposition subordonnée relative, introduite par le pronom relatif « que » (COD dans la relative : « ils élèvent ces six mille »). L'antécédent est « six mille ». C'est une relative adjective épithète déterminative. La corruption passe ici par la faveur (« élèvent en dignité ») et non la force : la subordination hiérarchique devient le moteur du système."}
  },

const GRAM_NOTIONS=[
  {titre:"Les classes grammaticales",items:["Nom (propre / commun) — varie en genre et en nombre","Déterminant — se place devant le nom : articles définis, indéfinis, partitifs, possessifs, démonstratifs","Adjectif — précise le sens d'un nom ; varie en genre et en nombre","Pronom — remplace un nom : personnel, possessif, démonstratif, indéfini, interrogatif, relatif","Verbe — varie en personne, nombre, temps, mode, voix","Adverbe (invariable) — précise un verbe, un adjectif, un autre adverbe","Préposition (invariable) — introduit un GN, pronom, infinitif : à, de, par, pour, sans…","Conjonction de coordination : mais, ou, et, donc, or, ni, car","Conjonction de subordination — introduit une subordonnée : que, quand, si, parce que…"]},
  {titre:"Les valeurs des temps de l'indicatif",items:["Présent : d'actualité · de vérité générale · de narration (vivacité) · futur proche · ordre","Passé simple : action de premier plan, achevée, délimitée dans le temps","Imparfait : second plan, description, action inachevée · valeurs modales : politesse, hypothèse, regret","Plus-que-parfait : action antérieure à un repère passé · irréel du passé","Futur simple : action à venir · certitude · ordre · vérité générale","Futur antérieur : action accomplie avant un repère futur · supposition","Conditionnel présent : condition · demande polie · hypothèse non avérée","Conditionnel passé : possibilité non réalisée · atténuation"]},
  {titre:"Le subjonctif et l'impératif",items:["Subjonctif — mode du possible, de la virtualité","En subordonnée complétive : après verbes de volonté (vouloir…), de sentiment (craindre…)","En subordonnée circonstancielle : but (pour que, afin que), concession (bien que), temps (avant que)","En subordonnée relative : après superlatif, après négation absolue","Impératif — ordre · défense · demande polie · conseil","Impératif présent : action future / Impératif passé : action achevée à un moment futur"]},
  {titre:"Les propositions subordonnées relatives",items:["Introduite par un pronom relatif : qui, que, quoi, dont, où (simples) ; lequel, auquel, duquel… (composés)","ATTENTION : « que » n'est un pronom relatif que s'il remplace un nom (antécédent)","Relative épithète (déterminative) : ne peut être supprimée sans modifier le sens","Relative apposée (explicative) : peut être supprimée ; entre virgules","Fonction du pronom relatif dans la relative : sujet, COD, COI, CC de lieu, complément du nom…"]},
  {titre:"Les propositions subordonnées circonstancielles",items:["Cause : parce que, puisque, dès lors que…","Conséquence : si bien que, de sorte que…","But : pour que, afin que, de peur que… (subjonctif)","Temps : quand, lorsque, après que, avant que…","Condition : si + présent → futur (éventuel) · si + imparfait → conditionnel (potentiel) · si + plus-que-parfait → conditionnel passé (irréel)","Concession : bien que, quoique… (subjonctif)","Opposition : tandis que, alors que… (indicatif)"]},
  {titre:"L'interrogation",items:["Interrogative directe totale (oui/non) : inversion ou « est-ce que »","Interrogative directe partielle (réponse précise) : adverbe (comment, pourquoi, quand…) ou pronom (qui, que, lequel…)","Interrogative indirecte totale : introduite par « si » · pas d'inversion · pas de point d'interrogation","Interrogative indirecte partielle : mêmes mots interrogatifs · pas d'inversion · pas de ?"]},
  {titre:"La négation",items:["Négation grammaticale : NE + pas, point, plus, jamais, rien, personne, aucun, ni…ni","Négation totale : porte sur toute la proposition (ne…pas, ne…point)","Négation partielle : nie un aspect (ne…plus, ne…jamais, ne…rien)","Négation exceptive : équivaut à « seulement » (ne…que)","Double négation : peut équivaloir à une affirmation","Ne explétif : sans valeur négative réelle (« je crains qu'il ne vienne »)","Niveau de langue : l'absence du NE relève du registre familier"]},
  {titre:"La phrase complexe",items:["Propositions juxtaposées : séparées par virgule, point-virgule ou deux points — lien implicite","Propositions coordonnées : reliées par une conjonction de coordination","Subordonnée conjonctive complétive : introduite par « que », COD du verbe principal","Subordonnée conjonctive circonstancielle : déplaçable, supprimable, exprime une circonstance","Subordonnée relative : introduite par pronom relatif, complète un antécédent","Proposition participiale : sujet différent du principal, valeur de cause ou de temps"]},
];

const buildPrompt=t=>`Tu es un examinateur du baccalauréat français pour l'épreuve orale de Français (Première générale). Tu conduis l'entretien qui suit la présentation de l'élève (≈ 10 min).

TEXTE : ${t.numero} — ${t.auteur} (${t.date}) — ${t.titre}
Parcours : ${t.parcours}
Problématique de l'élève : ${t.problematique}
Plan : ${t.etapes.map((e,i)=>`M${i+1} (${e.label}) : ${e.titre}`).join(' / ')}

DOMAINES À COUVRIR :
1. Approfondissement d'un procédé mentionné
2. Procédé non mentionné → demander une analyse
3. Question de grammaire (OBLIGATOIRE) : ${t.grammaire.enonce}
4. Parcours associé « ${t.parcours} » + comparaison avec un autre texte
5. Contexte historique et littéraire
6. Interprétation personnelle de l'élève
7. Mise en scène / genre si applicable

RÈGLES : Commence par accueillir l'élève. 2–4 phrases max par prise de parole. Ton bienveillant mais exigeant. Si l'élève bloque, guide-le. Bilan encourageant après 8–10 échanges. Réponds toujours en français.`;

function QuizObjet({objetId,c,label}){
  const qData=QUIZ_OBJETS[objetId]||{};
  const niveaux=[['n1','Niveau 1'],['n2','Niveau 2'],['n3','Niveau 3']];
  const [niv,setNiv]=useState('n1');
  const [qi,setQi]=useState(0);
  const [score,setScore]=useState(0);
  const [ans,setAns]=useState(null);
  const [done,setDone]=useState(false);
  const n=qData[niv]||{questions:[],label:'',c:'#888'};
  const q=n.questions[qi];

  const changeNiv=v=>{setNiv(v);setQi(0);setScore(0);setAns(null);setDone(false);};
  const handleAns=i=>{if(ans!==null)return;setAns(i);if(i===q.r)setScore(s=>s+1);};
  const next=()=>{if(qi+1>=n.questions.length){setDone(true);return;}setQi(q=>q+1);setAns(null);};
  const reset=()=>{setQi(0);setScore(0);setAns(null);setDone(false);};

  return(<div>
    <div style={{display:'flex',gap:8,marginBottom:'1rem',flexWrap:'wrap'}}>
      {niveaux.map(([k,l])=>qData[k]&&<button key={k} onClick={()=>changeNiv(k)} style={s.lvlBtn(niv===k,qData[k].c)}>{qData[k].label}</button>)}
    </div>
    {!n.questions.length?<div style={s.card}><p style={{fontSize:13,color:'#888'}}>Quiz à venir.</p></div>:
    <div style={s.card}>
      {!done?(<>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:'0.75rem'}}>
          <span style={{fontSize:12,color:'#888'}}>Question {qi+1} / {n.questions.length}</span>
          <span style={{fontSize:12,color:'#888'}}>Score : {score}</span>
        </div>
        <div style={{background:'#f5f4f0',borderRadius:8,padding:'0.75rem 1rem',marginBottom:'1rem'}}>
          <p style={{fontSize:15,fontWeight:500,lineHeight:1.5}}>{q.q}</p>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          {q.o.map((opt,i)=>{
            let bg='#fff',bc='#ddd',col='#1a1a18';
            if(ans!==null){if(i===q.r){bg='#eafaf1';bc='#27ae60';col='#1a6b3a';}else if(i===ans){bg='#fdf0ef';bc='#e74c3c';col='#a93226';}}
            return<button key={i} onClick={()=>handleAns(i)} style={{textAlign:'left',padding:'10px 14px',fontSize:14,borderRadius:8,border:`0.5px solid ${bc}`,background:bg,color:col,cursor:ans===null?'pointer':'default',lineHeight:1.5}}>{opt}</button>;
          })}
        </div>
        {ans!==null&&<button onClick={next} style={{...s.btn,marginTop:'1rem'}}>{qi+1>=n.questions.length?'Voir le résultat':'Question suivante →'}</button>}
      </>):(
        <div style={{textAlign:'center',padding:'1.5rem 0'}}>
          <p style={{fontSize:36,fontWeight:500,marginBottom:8}}>{score} / {n.questions.length}</p>
          <p style={{fontSize:14,color:'#888',marginBottom:'1.5rem'}}>{score>=n.questions.length*0.8?'Excellent travail !':score>=n.questions.length*0.6?'Bon début, continue à réviser.':'Reprends tes fiches avant de réessayer.'}</p>
          <button onClick={reset} style={s.btn}>Recommencer</button>
        </div>
      )}
    </div>}
  </div>);
}

function ObjetModule({objet,onBack}){
  const [tab,setTab]=useState('cours');
  const info=OBJETS_INFO[objet.id];
  const TABS=[['cours','📖 Cours'],['el','📝 Explications linéaires'],['quiz','🎯 Quiz']];
  return(<div>
    <button onClick={onBack} style={{...s.btn,marginBottom:'1rem',fontSize:12}}>← Retour</button>
    <div style={{padding:'1rem 1.25rem',background:objet.c+'15',borderLeft:`3px solid ${objet.c}`,borderRadius:8,marginBottom:'1rem'}}>
      <p style={{fontSize:11,textTransform:'uppercase',letterSpacing:'0.08em',color:objet.c,fontWeight:600}}>{objet.label}</p>
      <h2 style={{fontSize:18,fontWeight:500,margin:'4px 0'}}>{info.auteur}, <em>{info.oeuvre}</em> ({info.date})</h2>
      <p style={{fontSize:13,color:'#666'}}>Parcours : {info.parcours}</p>
    </div>
    <div style={{display:'flex',gap:6,marginBottom:'1.25rem',flexWrap:'wrap'}}>
      {TABS.map(([k,l])=><button key={k} style={s.tabBtn(tab===k)} onClick={()=>setTab(k)}>{l}</button>)}
    </div>
    {tab==='cours'&&<CoursObjet info={info} c={objet.c}/>}
    {tab==='el'&&<ELObjet objetId={objet.id} c={objet.c}/>}
    {tab==='quiz'&&<QuizObjet objetId={objet.id} c={objet.c} label={objet.label}/>}
  </div>);
}

function Methode(){
  const [open,setOpen]=useState(0);
  return(<div style={{display:'flex',flexDirection:'column',gap:8}}>
    {METHODE.map((bloc,i)=>(
      <div key={i} style={{...s.card,padding:0,overflow:'hidden'}}>
        <button onClick={()=>setOpen(open===i?-1:i)} style={{width:'100%',textAlign:'left',padding:'1rem 1.25rem',background:'none',border:'none',cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span style={{fontSize:14,fontWeight:500}}>{bloc.icon} {bloc.titre}</span>
          <span style={{color:'#888'}}>{open===i?'▲':'▼'}</span>
        </button>
        {open===i&&(<div style={{padding:'0 1.25rem 1.25rem',borderTop:'0.5px solid #eee'}}>
          {bloc.table?(
            <div style={{display:'flex',flexDirection:'column',gap:12,marginTop:12}}>
              {bloc.table.map((row,j)=>(
                <div key={j} style={{border:'0.5px solid #eee',borderRadius:8,padding:'0.75rem 1rem'}}>
                  <p style={{fontSize:12,fontWeight:600,color:'#888',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:6}}>{row.cat}</p>
                  <ul style={{margin:'0 0 0 16px',fontSize:13,lineHeight:1.8,color:'#444'}}>{row.items.map((it,k)=><li key={k}>{it}</li>)}</ul>
                </div>
              ))}
            </div>
          ):(
            bloc.contenu.map((sec,j)=>(
              <div key={j} style={{marginTop:12}}>
                <p style={{fontSize:12,fontWeight:600,color:'#888',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:6}}>{sec.sous}</p>
                <ul style={{margin:'0 0 0 16px',fontSize:13,lineHeight:1.85,color:'#444'}}>{sec.items.map((it,k)=><li key={k}>{it}</li>)}</ul>
              </div>
            ))
          )}
        </div>)}
      </div>
    ))}
  </div>);
}

function Grammaire(){
  const [open,setOpen]=useState(0);
  return(<div>
    <p style={{fontSize:13,color:'#888',marginBottom:'1rem',lineHeight:1.6}}>Fiches de référence pour la question de grammaire.</p>
    <div style={{display:'flex',flexDirection:'column',gap:8}}>
      {GRAM_NOTIONS.map((n,i)=>(
        <div key={i} style={{...s.card,padding:0,overflow:'hidden'}}>
          <button onClick={()=>setOpen(open===i?-1:i)} style={{width:'100%',textAlign:'left',padding:'1rem 1.25rem',background:'none',border:'none',cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span style={{fontSize:14,fontWeight:500}}>📌 {n.titre}</span>
            <span style={{color:'#888'}}>{open===i?'▲':'▼'}</span>
          </button>
          {open===i&&(<div style={{padding:'0 1.25rem 1.25rem',borderTop:'0.5px solid #eee'}}>
            <ul style={{margin:'0.75rem 0 0 16px',fontSize:13,lineHeight:1.9,color:'#444'}}>{n.items.map((it,k)=><li key={k}>{it}</li>)}</ul>
          </div>)}
        </div>
      ))}
    </div>
  </div>);
}

function Simulation(){
  const [simId,setSimId]=useState(1);
  const [copied,setCopied]=useState(false);
  const t=TEXTES.find(x=>x.id===simId);
  const copy=()=>{navigator.clipboard.writeText(buildPrompt(t)).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2000);});};
  const open=()=>{window.open('https://claude.ai/new?q='+encodeURIComponent(buildPrompt(t).substring(0,2000)),'_blank');};
  return(<div style={s.card}>
    <p style={{fontSize:14,lineHeight:1.7,color:'#666',marginBottom:'1.25rem'}}>La simulation s'ouvre dans <strong>claude.ai</strong> avec le prompt de l'examinateur configuré pour le texte choisi.</p>
    <div style={{marginBottom:'1.25rem'}}>
      <label style={s.label}>Texte pour la simulation</label>
      <select value={simId} onChange={e=>setSimId(Number(e.target.value))} style={{maxWidth:420}}>
        {TEXTES.map(t=><option key={t.id} value={t.id}>{t.numero} — {t.auteur}, {t.titre}</option>)}
      </select>
    </div>
    {t&&(<div style={{background:'#f5f4f0',borderRadius:8,padding:'0.75rem 1rem',marginBottom:'1.25rem',fontSize:13}}>
      <p><strong>Problématique :</strong> {t.problematique}</p>
      <p style={{marginTop:6,color:'#888',fontSize:12}}><strong>Question de grammaire suggérée :</strong> {t.grammaire.enonce}</p>
    </div>)}
    <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
      <button onClick={open} style={{...s.btn,background:'#1a1a18',color:'#fff',border:'none'}}>Ouvrir dans Claude →</button>
      <button onClick={copy} style={s.btn}>{copied?'Copié ✓':'Copier le prompt'}</button>
    </div>
  </div>);
}

function App(){
  const [view,setView]=useState('home');
  const [currentObjet,setCurrentObjet]=useState(null);
  const openObjet=o=>{setCurrentObjet(o);setView('objet');};
  const home=()=>{setView('home');setCurrentObjet(null);};
  return(<div style={{maxWidth:740,margin:'0 auto',padding:'2rem 1rem'}}>
    <div style={{cursor:'pointer'}} onClick={home}>
      <h1 style={{fontSize:20,fontWeight:500,marginBottom:4}}>Révision oral de bac — Français</h1>
      <p style={{fontSize:13,color:'#888',marginBottom:'1.5rem'}}>Lycée Jean Prévost · 1ères G · Mme Berger</p>
    </div>
    {view==='home'&&(<div>
      <p style={{fontSize:13,color:'#666',marginBottom:'1.25rem',lineHeight:1.6}}>Choisis un objet d'étude pour accéder au cours, aux explications linéaires et aux quiz.</p>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:'1.5rem'}}>
        {OBJETS.map(o=>{
          const info=OBJETS_INFO[o.id];
          return(<div key={o.id} onClick={()=>openObjet(o)} style={{cursor:'pointer',padding:'1.25rem 1rem',borderRadius:12,border:`1px solid ${o.c}40`,background:o.c+'10',transition:'all 0.15s'}}
            onMouseEnter={e=>{e.currentTarget.style.background=o.c+'22';e.currentTarget.style.transform='translateY(-2px)';}}
            onMouseLeave={e=>{e.currentTarget.style.background=o.c+'10';e.currentTarget.style.transform='translateY(0)';}}>
            <p style={{fontSize:11,textTransform:'uppercase',letterSpacing:'0.08em',color:o.c,fontWeight:600,marginBottom:6}}>{o.label}</p>
            <p style={{fontSize:14,fontWeight:500,marginBottom:2}}>{info.auteur}</p>
            <p style={{fontSize:13,fontStyle:'italic',color:'#444',marginBottom:6}}>{info.oeuvre}</p>
            <p style={{fontSize:11,color:'#888'}}>Parcours : {info.parcours}</p>
          </div>);
        })}
      </div>
      <div style={{borderTop:'0.5px solid #eee',paddingTop:'1.25rem'}}>
        <p style={{fontSize:11,textTransform:'uppercase',letterSpacing:'0.08em',color:'#888',fontWeight:600,marginBottom:10}}>Outils transversaux</p>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          <button onClick={()=>setView('methode')} style={s.btn}>📐 Méthode de l'oral</button>
          <button onClick={()=>setView('grammaire')} style={s.btn}>📌 Fiches de grammaire</button>
          <button onClick={()=>setView('sim')} style={s.btn}>🤖 Simulation d'oral IA</button>
        </div>
      </div>
    </div>)}
    {view==='objet'&&currentObjet&&<ObjetModule objet={currentObjet} onBack={home}/>}
    {(view==='methode'||view==='grammaire'||view==='sim')&&(<div>
      <button onClick={home} style={{...s.btn,marginBottom:'1rem',fontSize:12}}>← Retour à l'accueil</button>
      {view==='methode'&&<Methode/>}
      {view==='grammaire'&&<Grammaire/>}
      {view==='sim'&&<Simulation/>}
    </div>)}
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
